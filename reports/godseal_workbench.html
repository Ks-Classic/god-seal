<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GODSEAL Workbench</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17191c;
      --muted: #5f6670;
      --line: #d9dee5;
      --surface: #f4f6f8;
      --panel: #fff;
      --accent: #0f766e;
      --accent-weak: #e5f3f1;
      --bad: #9f1239;
      --bad-weak: #ffe4e6;
      --focus: #1d4ed8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--surface);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.55;
    }
    main {
      width: min(1440px, calc(100% - 28px));
      margin: 0 auto;
      padding: 20px 0 36px;
    }
    .shell {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 380px;
      gap: 16px;
      align-items: start;
    }
    header.top {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 16px;
      padding: 8px 0 18px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 16px;
    }
    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.12;
      letter-spacing: 0;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: end;
      margin: 0;
      padding: 0;
      list-style: none;
      color: var(--muted);
      font-size: 12px;
    }
    .meta li,
    .pill {
      padding: 4px 7px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      white-space: nowrap;
    }
    .toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 10px;
      margin-bottom: 12px;
    }
    label {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    input,
    textarea {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--panel);
      color: var(--ink);
      font: inherit;
    }
    input {
      height: 34px;
      padding: 5px 8px;
    }
    input:focus,
    textarea:focus {
      outline: 2px solid color-mix(in srgb, var(--focus), transparent 70%);
      border-color: var(--focus);
    }
    .sections {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    section,
    aside {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }
    section h2,
    aside h2 {
      margin: 0;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      font-size: 17px;
      letter-spacing: 0;
    }
    .frame-list {
      display: grid;
      gap: 0;
    }
    .frame-row {
      display: grid;
      grid-template-columns: 42px 86px minmax(120px, 1fr) 72px;
      gap: 8px;
      align-items: center;
      min-height: 58px;
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
    }
    .frame-row:last-child { border-bottom: 0; }
    .pos {
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border-radius: 999px;
      background: var(--surface);
      font-weight: 800;
    }
    .planet {
      min-width: 0;
      font-size: 13px;
      font-weight: 750;
    }
    .planet span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
      overflow-wrap: anywhere;
    }
    .role {
      min-width: 0;
      font-size: 13px;
      overflow-wrap: anywhere;
    }
    .role span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }
    .code-cell input {
      text-align: center;
      font-weight: 750;
    }
    .status-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
    }
    .metric {
      min-width: 0;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--surface);
    }
    .metric strong {
      display: block;
      font-size: 22px;
      line-height: 1.1;
    }
    .metric span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .review {
      max-height: 42vh;
      overflow: auto;
      border-bottom: 1px solid var(--line);
    }
    .review-item {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
    }
    .review-item:last-child { border-bottom: 0; }
    .review-item.ok { border-left: 4px solid var(--accent); }
    .review-item.missing,
    .review-item.invalid,
    .review-item.empty { border-left: 4px solid var(--bad); }
    .review-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-weight: 800;
      font-size: 13px;
    }
    .review-body {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }
    .output {
      display: grid;
      gap: 10px;
      padding: 12px;
    }
    textarea {
      min-height: 118px;
      padding: 8px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.45;
    }
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    button {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--panel);
      color: var(--ink);
      font: inherit;
      font-weight: 750;
      cursor: pointer;
      padding: 6px 10px;
    }
    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }
    button:disabled {
      cursor: not-allowed;
      opacity: .45;
    }
    .notice {
      min-height: 24px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .ok-text { color: var(--accent); }
    .bad-text { color: var(--bad); }
    @media (max-width: 1120px) {
      .shell { grid-template-columns: 1fr; }
      aside { order: -1; }
      .review { max-height: 260px; }
    }
    @media (max-width: 760px) {
      main { width: min(100% - 18px, 1440px); }
      header.top,
      .toolbar,
      .sections { grid-template-columns: 1fr; display: grid; }
      .meta { justify-content: start; }
      .frame-row {
        grid-template-columns: 34px minmax(0, 1fr) 70px;
        gap: 7px;
      }
      .planet { display: none; }
      .status-strip { grid-template-columns: 1fr 1fr 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <header class="top">
      <h1>GODSEAL Workbench</h1>
      <ul class="meta">
        <li>Source-bound</li>

    <div class="toolbar">

      </label>
      <label>Output prefix
        <input id="outputPrefix" value="reports/chart">

    </div>
    <div class="shell">
      <div class="sections">
        <section>

        </section>
        <section>
          <h2>Face</h2>

      </div>
      <aside>

          <div class="metric"><strong id="validCount">0</strong><span>valid</span></div>
          <div class="metric"><strong id="missingCount">0</strong><span>missing</span></div>
          <div class="metric"><strong id="invalidCount">22</strong><span>invalid</span></div>

        <div class="review" id="reviewList"></div>
        <div class="output">
          <label>Pipeline command
            <textarea id="commandOutput" readonly></textarea>
          </label>
          <label>Reading JSON
            <textarea id="jsonOutput" readonly></textarea>
          </label>
          <div class="actions">
            <button class="primary" id="loadSample">Load sample</button>
            <button id="copyCommand">Copy command</button>
            <button id="copyJson">Copy JSON</button>
            <button id="clearAll">Clear</button>
          </div>
          <div class="notice" id="notice"></div>
        </div>
      </aside>
    </div>
  </main>

を見つけた\n黒羽さえりみたいな感じ。やり方を見つけた人。"},"23.5":{"code":"23.5","label":"わたくし史上最強","title":"風地観","target":20,"source_available":true,"source_pdf":"【17~24】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["わたくし史上最強","風地観","言葉が命,名言,グローバルスタンダード"],"source_excerpt":"言葉が命,名言,グローバルスタンダード\n言葉を正すという意味。\n「言葉が命」だから、コンパイルと\nいう意味でもある。\n「名言」ともいえるし、言葉が「グローバ\nルスタンダード」をつくる。この番号は言語やプログラムの"},"23.6":{"code":"23.6","label":"包容力","title":"坤為地","target":2,"source_available":true,"source_pdf":"【17~24】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["包容力","坤為地","エネルギー設計,造作物,作品の展示"],"source_excerpt":"エネルギー設計,造作物,作品の展示\nスピリチュアルなエネルギーワークや、発電所の設計、車の\nエンジンシステムのような「エネルギー設計」。設計され造\nられたもの。言葉は「時間 + 好み」で、愛であり、神は光で\nあるというのが言葉 。他には、憧れの君、理想の音楽を作る\nときの「想い人」ともいえる。"},"24.1":{"code":"24.1","label":"包容力","title":"坤為地","target":2,"source_available":true,"source_pdf":"【17~24】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["包容力","坤為地","ランウェイ,パリのファッションウィーク"],"source_excerpt":"ランウェイ,パリのファッションウィーク\nシャネルの専属デザイナーが、凄い額の遺産を飼い猫に残し、\nお手伝いさんが三人付く「世界一お金持ちの猫」として世界\nから見られている。そんな注目を集める存在。アートを見せ"},"24.2":{"code":"24.2","label":"姐御","title":"地沢臨","target":19,"source_available":true,"source_pdf":"【17~24】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["姐御","地沢臨","シンボル的な商品"],"source_excerpt":"シンボル的な商品\n最高のクリエイティブ「アーティスト」が、ちゃっかり受け\n取る「姐御」の方向へ動くと、\n「シンボル的な商品」。黒羽\nさえりのシンボルは「GODSEAL」という様に、その人を\n象徴するシンボリックな代表商品、"},"24.3":{"code":"24.3","label":"はぁはぁしよっ","title":"地火明夷","target":36,"source_available":true,"source_pdf":"【17~24】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["はぁはぁしよっ","地火明夷","おっぱいチョコ, 戦隊アニメヒーロー"],"source_excerpt":"おっぱいチョコ, 戦隊アニメヒーロー\n人々の氣持ちを想起させる象徴的なキャラクター。普通の\nチョコだと売れなかったのに、おっぱいの形にしただけで、\n飛ぶように売れた商品。"},"24.4":{"code":"24.4","label":"龍の逆鱗","title":"震為雷","target":51,"source_available":true,"source_pdf":"【17~24】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["龍の逆鱗","震為雷","マイメディア"],"source_excerpt":"マイメディア\n自分を動画に映した時、\n「私の世界」はここにある。あなた\nが作っているあなたの世界。\n「私」というのは、他者に見られて\nいる（ 誰かの目に映っている）姿で、自分のメディアってこと。"},"24.5":{"code":"24.5","label":"産婆さん","title":"水雷屯","target":3,"source_available":true,"source_pdf":"【17~24】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["産婆さん","水雷屯","世界を作る人"],"source_excerpt":"世界を作る人\nタロットカードの「World（世界 ）のカード」という意味。世\n界を作る人というのは、言葉を生み出してる人。雷の信号・振\n動\nが、細\n細胞（\n水）\nに映り、想いになり表現されている。法律や"},"24.6":{"code":"24.6","label":"小鳥守","title":"山雷頤","target":27,"source_available":true,"source_pdf":"【17~24】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["小鳥守","山雷頤","好感度 ,チャリティーライブ"],"source_excerpt":"好感度 ,チャリティーライブ\n「チャリティーライブ」は、非常に現代的で戦術的なイデオ\nロギーのひとつ。想いを引っ張っていく為の器を作れば、\n人はそこに想いを投げるから「好感度」。あなたのやりたい\n人生が、\n「それ素敵だね」と思われる表現になっていないと\nダメ。ティンカーベルの魔法の粉みたいな意味も。"},"25.1":{"code":"25.1","label":"マナー講師","title":"天地否","target":12,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["マナー講師","天地否","えんま大王"],"source_excerpt":"えんま大王\n達観的な強い愛を査定する人。非常に律儀に、\n教本に誠実に、\n人間社会に寄り添って、鮮やかに華麗に、正しい裁きをくだ\nす。人間社会の裁判官ではなく、黄泉の国の「えんま大王」。\nあの世とこの世の境目に立っている人 。"},"25.2":{"code":"25.2","label":"自分への愛","title":"天沢履","target":10,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["自分への愛","天沢履","宇宙人 , 自己愛 , 教祖"],"source_excerpt":"宇宙人 , 自己愛 , 教祖\n宇宙的な視座にいる人。人間社会と宇宙との境目にいる「人\n間じゃない」感覚 。非情に他人から見られているけど、\n本人\nにその自覚はなし。自分に愛が向いて、相手に訴求が無いの\nは、ある意味、神の領域。広い意味で、自分を愛することは、\n宇宙を愛すること。"},"25.3":{"code":"25.3","label":"ダビンチコード","title":"天火同人","target":13,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["ダビンチコード","天火同人","伝説 , 伝聞 ,キリスト"],"source_excerpt":"伝説 , 伝聞 ,キリスト\nあるけれど、無いようなもの。自分で作るエネルギーなんだ\nけど、伝説や伝聞は、人と人で作られるもの。この場合の「キ\nリスト」は、宇宙の声を聴く人。客観的だし、達観的な存在\nであるという意味で、\n「伝説」や、\n「キリスト」。"},"25.4":{"code":"25.4","label":"引き際の魔術師","title":"風雷益","target":42,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["引き際の魔術師","風雷益","豊作"],"source_excerpt":"豊作\n利益が凄く強くでる。エネルギーをピンからキリまで動か\nした時、どの辺が一番生産として強い形になるのかを探る力。\n人間の意図や意志、受け取る人のエネルギーが介在してい\nる。ある意味、\n「豊作」というのは、\n「ここからここまでの間\nの中のここ」というデザインでもある。"},"25.5":{"code":"25.5","label":"相続","title":"火雷噬嗑","target":21,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["相続","火雷噬嗑","地鎮祭 , 教祖誕生"],"source_excerpt":"地鎮祭 , 教祖誕生\nそこにあるエネルギーを受け取って、新しいエネルギーとし\nて送り出すことで、圧倒的に場を統べる者。土地のエネル\nギーを統べるから「地鎮祭」。または、エネルギーを受け取っ\nて、場を統制する人が生まれるという意味で「教祖誕生」。"},"25.6":{"code":"25.6","label":"フィクサー","title":"沢雷随","target":17,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["フィクサー","沢雷随","名奉行"],"source_excerpt":"名奉行\n唯一無二。東京では総理よりも発言力がある「東京都知事」\nみたいな存在。非常に達観的なポジションから、最適なコー\nチングをしたり、お裁きをするような人だから「名奉行」。\n実際に、地方の特定エリアにおいて、非常に優秀な政治がで\nきる人。"},"26.1":{"code":"26.1","label":"完璧主義者","title":"山風蠱","target":18,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["完璧主義者","山風蠱","プレミアム , 存在肯定"],"source_excerpt":"プレミアム , 存在肯定\n人の細かい部分を見るので、文句を言いがち。それは、その\n人が、できる・知っている・持っているという前提に立って\nいる、強烈な「存在肯定」、つまり、愛の人 。散々文句を言\nいまくることで研ぎ澄まされいくから「プレミアム」。時に\n勘違いもするツンデレ。"},"26.2":{"code":"26.2","label":"社交界の華","title":"山火賁","target":22,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["社交界の華","山火賁","女帝"],"source_excerpt":"女帝\n皆が知っていて、周りに人が集まり、人を繋ぐ存在の「女帝」。\n人を使える人であり、皆に見られている人だから、女帝でし\nかない。正しく動かすためには、皆に知られていることが大\n事。いざ何かをするとなると、必ず人が集まってくる。でも\nその人本体は凄くドライ。"},"26.3":{"code":"26.3","label":"筆おろし専門","title":"山沢損","target":41,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["筆おろし専門","山沢損","アドベンチャー, 油田を当てた人"],"source_excerpt":"アドベンチャー, 油田を当てた人\n多くの人目に晒され、周知させる特性で、人が動く価値ある何\nかを見出すから「アドベンチャー」。モノを作り、\nモノを見たりす\nると、お金になる温泉や油田を掘り当て、経済を起こす。テン\nションを掛けることで、多くの人を集め、皆で儲けて楽しむこと\nができる。"},"26.4":{"code":"26.4","label":"太陽の化身","title":"火天大有","target":14,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["太陽の化身","火天大有","大漁"],"source_excerpt":"大漁\nここはこれが釣れる、あそこではこれが釣れるということ\nを知っている。真ん中で漁をすれば全部釣れるから、いつも\n大漁。それを周知されていて、\nイニシアティブ・権利・権力\nを持っている人。大きな力なので、\nコトが絶対に動きます。\n人を使って皆でやることが大事。"},"26.5":{"code":"26.5","label":"人体実験","title":"風天小畜","target":9,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["人体実験","風天小畜","軍師"],"source_excerpt":"軍師\n人を動かすことができるから軍師。滅茶苦茶頭がいい。人望\nもあり、目的の為の調査も完璧。冷たいくらい客観的に、\n権力を持ち、勝つ為ならどんな裏切りも行使する。ヒーロー\nとして、綺麗な良い人に見えるけど、その可愛げには壮大な\n裏がある。"},"26.6":{"code":"26.6","label":"ヘルスケア","title":"地天泰","target":11,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["ヘルスケア","地天泰","ブランド, チケット, 株券"],"source_excerpt":"ブランド, チケット, 株券\n型として周知されている、皆が欲しい物。\nブランドという揺るぎ\nないポジション。本人もブランドだし、その人の作品もブランド。\n周知されているということで、それを使えば何でもできるし、絶\n対に人が動くものだから「チケット」\n「株券」みたいな意味も\nある。"},"27.1":{"code":"27.1","label":"ゴットハンド","title":"山地剝","target":23,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["ゴットハンド","山地剝","心のままに生きる , 格言"],"source_excerpt":"心のままに生きる , 格言\nこの番号の人が、自分の自由になる場を持たず、心のままに\n生きられない状況であれば、\nこの世で生きていくのが厳しい\nと感じているはず。嘘がつけないまっすぐなエネルギーなの\nで、自分の振動のありのままに生きていないと、何をするの\nも無理な感じ。"},"27.2":{"code":"27.2","label":"筆おろし専門","title":"山沢損","target":41,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["筆おろし専門","山沢損","初の試み"],"source_excerpt":"初の試み\n壮大な規模感、宇宙規模での「初の試み」のこと。人類が\n初めて挑む、命がけで、死ぬかもしれないシーン。未来がど\nうなるか分からない状況だとしても、保証のない世界に対\nして、命をかけた一歩を出すという勇氣ある試み。"},"27.3":{"code":"27.3","label":"社交界の華","title":"山火賁","target":22,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["社交界の華","山火賁","ハニートラップ,ボディーアート,タトゥー"],"source_excerpt":"ハニートラップ,ボディーアート,タトゥー\nハニートラップと言っても、非常にアカデミックな場で、\n自分の命をかけて想いを表現していく存在。自分のやりた\nいことではなく、お役目として、自分の命を投げるという意\n味。自分の体を使って、自らを表現するという意味で、"},"27.4":{"code":"27.4","label":"相続","title":"火雷噬嗑","target":21,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["相続","火雷噬嗑","地主"],"source_excerpt":"地主\n自然界の食物連鎖の頂点がライオンというのであれば、人間\nの世界の食物連鎖の頂点にいるのは「地主」。ある意味、政治\n家よりも確実に強い。あらゆる意味で豊かな富を生み出す\n土地を相続し、命をかけて守っている人 。"},"27.5":{"code":"27.5","label":"引き際の魔術師","title":"風雷益","target":42,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["引き際の魔術師","風雷益","職業タレント, 芸能人"],"source_excerpt":"職業タレント, 芸能人\n自分では知らないところで、何も知らずにやらされている人。\nイメージコントロールに利用される可能性が非常に高い。象徴\n的にお金の値段や価値をつけられて、本人にも知らされずに、\n世の中の人に使われている「職業タレント」や「芸能人」。"},"27.6":{"code":"27.6","label":"アーティスト","title":"地雷復","target":24,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["アーティスト","地雷復","人生を表現する人"],"source_excerpt":"人生を表現する人\n「小鳥守」が「アーティスト」の方向に進むエネルギーは、\n命をかけて守っている大切な場と、それを守る人生自体を、\n自分の命をかけて、芸術として、アート作品として創造して\nいるかのように表現する人。是か非かではありません。"},"28.1":{"code":"28.1","label":"ボイス","title":"沢天夬","target":43,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["ボイス","沢天夬","経験は宝,自分の内なる真実 , 魂の自分"],"source_excerpt":"経験は宝,自分の内なる真実 , 魂の自分\n人から言われたとか、ルールに従うための何かではなく、自\n分の内なる声ボイスに従って、必ずうまくやれるという一点\nに向かって動く。内なる声は、必ずうまくいく方向を指し示\nすので、\n人から見て危ないようにみえても絶対に無事でいる。\n内なる光に忠実であれ！"},"28.2":{"code":"28.2","label":"広告担当","title":"沢山咸","target":31,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["広告担当","沢山咸","真似のできぬ芸当 , 殉教"],"source_excerpt":"真似のできぬ芸当 , 殉教\n「リスク中毒」の力が「広告担当」に向くということは、一言\nでいうと「殉教」です。自分の信仰や信念を守るために命を\n捧げる行為、その仕事で死ぬ。献身の象徴的な行為、自らの\n意思で十字架にかかるという意味で「真似のできぬ芸当」。"},"28.3":{"code":"28.3","label":"映画監督","title":"沢水困","target":47,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["映画監督","沢水困","オカルト婚, 掘り出し物,万馬券,ごぼう抜き"],"source_excerpt":"オカルト婚, 掘り出し物,万馬券,ごぼう抜き\n「オカルト婚」というのは、\n「この人とこの人が何で結婚する\nの？」みたいな、浮世離れした理由でのご縁。「掘り出し物」\n「万馬券」や、\n「ごぼう抜き」は、\n「あれ？」"},"28.4":{"code":"28.4","label":"黒魔術","title":"水風井","target":48,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["黒魔術","水風井","できレース, 紹介営業,コネ入社, 麻酔"],"source_excerpt":"できレース, 紹介営業,コネ入社, 麻酔\n表面的には公正な競争や試合のように見えるが、実際には\n結果があらかじめ決まっている不正な競技や選考。物凄い\n準備とテクニックが必要。\n「麻酔」\nも同じ。\nうまくかけるには、\n多くても少なくてもダメだし、効いてなかったら激痛。凄く\nミステリアスなテクニックの世界。"},"28.5":{"code":"28.5","label":"裏信長","title":"雷風恒","target":32,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["裏信長","雷風恒","シンデレラストーリー"],"source_excerpt":"シンデレラストーリー\n一氣に成功や幸福を手に入れる劇的な変化を遂げる「シン\nデレラストーリー」\n。唯一の道、唯一の出口が見えて、\nそれに\n向かっていくエネルギー。\n「何かを変えていくにはこの道し\nかない」というように確信に満ちた方向性が見える。"},"28.6":{"code":"28.6","label":"魚群探知機","title":"天風姤","target":44,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["魚群探知機","天風姤","アンパンマン, 新種 ,集中治療室, 湧き水"],"source_excerpt":"アンパンマン, 新種 ,集中治療室, 湧き水\n「僕の顔をお食べ」と言い、\n「命をかけてくれてありがとう」と思\nわせるが、どちらかと言えば誤解。何かの力を加えたら、元々\nあった「湧き水」が湧いて出てくる。元からあった種が見つか\nるのが「新種」。病が治る道があって、それを見極める「集中\n治療室」\n。経験のある者には容易。"},"29.1":{"code":"29.1","label":"地球の浣腸","title":"水沢節","target":60,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["地球の浣腸","水沢節","天皇家 , 王族 , 古墳 , 王家"],"source_excerpt":"天皇家 , 王族 , 古墳 , 王家\n「引き寄せ」のエネルギーが、\n「地球の浣腸」方向で起こって\nいる常態は、水が大地から湧くような「元のエネルギー」。\n今あるもののすべてが、この「もとの点」から広がっていった\n歴史。文明の最初に中心となった一族、国という巨大な意識\n場の「主 ( ぬし)」となり、現存する形 。"},"29.2":{"code":"29.2","label":"舞台監督","title":"水地比","target":8,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["舞台監督","水地比","スーパー助産師,ポップの天才,天才バイヤー"],"source_excerpt":"スーパー助産師,ポップの天才,天才バイヤー\n「引き寄せ」が「舞台監督」の方向にいくと、\n「スーパー助産師」\nという、何かを生み出す天才になる。ポップの天才は、表現\nする天才。目に見えている綺麗な称号。天才バイヤーは、いい\nものを集めてくる天才の象徴的な称号。"},"29.3":{"code":"29.3","label":"黒魔術","title":"水風井","target":48,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["黒魔術","水風井","ねこ"],"source_excerpt":"ねこ\nネコというシステム。ネコ科はどういう生態で生きてこられ\nたのかを調べてみればわかる。ネコになっていればその形\nを出しているということ。ネコを観察して、その生態の特徴\nをミミクリーすればいい。"},"29.4":{"code":"29.4","label":"映画監督","title":"沢水困","target":47,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["映画監督","沢水困","内外一致のカメハメ波"],"source_excerpt":"内外一致のカメハメ波\n自分の内側と外側の想いが一致した瞬間に、ものすごいエ\nネルギーを出す。\n「内外一致しないと表現できない」という\nことかもしれない。一致するというのは、ここしかないとい\nう「点」でしかおこらないから、表現の点、立ち位置みたい\nな意味合いもあります。"},"29.5":{"code":"29.5","label":"ご意見番","title":"地水師","target":7,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["ご意見番","地水師","Ｔ細胞（免疫細胞）"],"source_excerpt":"Ｔ細胞（免疫細胞）\n, mRNA\n情報伝達のための細胞レベルの信号。Ｔ細胞は、キラー細\n胞、重要な免疫細胞。小さな細密な世界の指令が、人体のす\nべてをコントロールしている。DNAにおける「mRNA（メッ\nセンジャーRNA）\n」の働き、言葉を伝達するエネルギーと言\nうか、バイパスになる。"},"29.6":{"code":"29.6","label":"色氣","title":"風水渙","target":59,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["色氣","風水渙","玉砕,命の宝石, 鮮やかに砕け散る"],"source_excerpt":"玉砕,命の宝石, 鮮やかに砕け散る\n見事に砕け散るという意味。命が輝いているとか、魂そのも\nのかもしれない。命が輝く瞬間が魂、私の命の瞬間が魂、\n自分の人生に埋没して、ぶつかって砕け散る、毎日、自分の\n命が玉砕するということは、命が毎日スパークし、最高の自\n分をぶつけて表現しているということ。"},"30.1":{"code":"30.1","label":"いとをかし","title":"火山旅","target":56,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["いとをかし","火山旅","笑いの神"],"source_excerpt":"笑いの神\n喋ってると降りてくる神。関西人には凄く馴染み深い。\n「こ\nの人、今日笑いの神がついてるな」\n「何を言っても面白い」\nとなっている時に、その人の周りに集まる場のエネルギー。\n笑いの神という存在がいるのか、いないのかではなく、そう\nいうエネルギーだってこと。"},"30.2":{"code":"30.2","label":"太陽の化身","title":"火天大有","target":14,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["太陽の化身","火天大有","大富豪"],"source_excerpt":"大富豪\n度が過ぎるほどの大富豪。いやらしいくらい金ピカのイメージ。\nトランプゲームの大富豪では、天地がひっくり返るみたいに、\n大富豪から大貧民になる。それと同じように、"},"30.3":{"code":"30.3","label":"相続","title":"火雷噬嗑","target":21,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["相続","火雷噬嗑","天才実業家"],"source_excerpt":"天才実業家\n才能の塊みたいな人。世の中で成功している人。取れないも\nのは何もない。自分の強みを 100% 活かし、それを人に見られ\nている姿。そこに愛や、夢や希望はなくて、ただ単に好奇心\nで「面白かったから」だけで進む。普通に人、命、愛、常識\nを考えてたら、こうはなれない。"},"30.4":{"code":"30.4","label":"社交界の華","title":"山火賁","target":22,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["社交界の華","山火賁","円座 ,マーティンルーサーキング"],"source_excerpt":"円座 ,マーティンルーサーキング\n「私たちには夢がある」という演説をしたキング牧師。光を\n見せる演説をしている、皆に光が見えた瞬間。\n「私たちには\n夢がある」というのは、\n「光があるよ」と教えてくれた人 。\n皆がその言葉に触れた瞬間。\n「非常に華やかなオーラが放た\nれた」という感じ。“ 華やかさ” がポイント。"},"30.5":{"code":"30.5","label":"ダビンチコード","title":"天火同人","target":13,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["ダビンチコード","天火同人","発明家 , 運命"],"source_excerpt":"発明家 , 運命\n非常に「火」のエネルギーの象徴的な感じ。\n「発見した」に\n起因する。\n「人が何かに遭遇して使えるようになった」\n「やっ\nちゃった」\n「見ちゃった」\n「できちゃった」等が起きた、その\n瞬間のエネルギー。具体的に「火」が開かれて、使える常態\nになったということ。"},"30.6":{"code":"30.6","label":"歓喜","title":"雷火豊","target":55,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["歓喜","雷火豊","最上の愛 , 宿命, 前人未到の地"],"source_excerpt":"最上の愛 , 宿命, 前人未到の地\n好奇心によって、誰かが光を見た瞬間に、見た人が背負うも\nの。無常かつ非情な感覚。まるで、どこかに神様の台本みた\nいなものがあったかのように伝わっていく、豊かで凄く強い\nエネルギー。誰か一人の選択ではなくて、全体に開かれた時\nにみんなが選ぶもの。"},"31.1":{"code":"31.1","label":"親分","title":"沢火革","target":49,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["親分","沢火革","番頭さん, 最年少キャリア, 管理職 , 若頭"],"source_excerpt":"番頭さん, 最年少キャリア, 管理職 , 若頭\n「広告担当」のエネルギーが、\n「親分」の方向に動くというこ\nとは、期待されている役目という意味になる。\n「番頭さん」\nは、\n店の中での重要なお役目、\n「最年少キャリア」は生え抜きの\nビジネスマン。\n「管理職」\n「若頭」\nも、組織の中で重要な、期待\nされている仕事をこなす人たち。"},"31.2":{"code":"31.2","label":"リスク中毒","title":"沢風大過","target":28,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["リスク中毒","沢風大過","究極の選択"],"source_excerpt":"究極の選択\n本人がその状況にある、\nというか、自分がミミクリーを実行\nするために、追い詰められた先、行き着く先。それ以外はあ\nり得ない。究極の選択をセレクトすることで、ダッシュして、\n噴き上がるエネルギーをゲットできる。ミミクリーは、その\n常態になることでエネルギーを享受できる。"},"31.3":{"code":"31.3","label":"お金にする","title":"沢地萃","target":45,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["お金にする","沢地萃","目玉商品,有馬記念 ,待望の長男"],"source_excerpt":"目玉商品,有馬記念 ,待望の長男\n「待望の長男」とは、期待して期待して期待して、\nやっと生ま\nれた男の子。期待されて期待されて、やっと何かが開催され\nるみたいなイメージ。そういう意味の「有馬記念」とか「目\n玉商品」とか。会社の命運を背負って何かを出す、みたいな\n感じ。"},"31.4":{"code":"31.4","label":"炎上商法","title":"水山蹇","target":39,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["炎上商法","水山蹇","伝説を超える人 , 日本人初"],"source_excerpt":"伝説を超える人 , 日本人初\n今までの伝説を塗り替えた人 。みんなが選んできた新しいスー\nパースター。\nリアルで何か凄いことを成し遂げた人。この人の\n力で「今までの歴史を塗り替える」という意味がある。"},"31.5":{"code":"31.5","label":"和尚さん","title":"雷山小過","target":62,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["和尚さん","雷山小過","らい - ざん - しょうか［和尚さん］"],"source_excerpt":"らい - ざん - しょうか［和尚さん］"},"31.6":{"code":"31.6","label":"未知との遭遇","title":"天山遯","target":33,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["未知との遭遇","天山遯","呪われたサファイア, 実験力保持, 真実の扉の鍵"],"source_excerpt":"呪われたサファイア, 実験力保持, 真実の扉の鍵\n形容詞的でキャラクターチックなイメージ。物語を明示するよ\nうな、方向性を期待させるような、\nドラマみたいなイメージ。\n「呪\nわれたサファイア」で何を想像する？どういう方向に向かってい\nく？それを持った人はどうなるの？みたいに、その鍵によって、\nどういう方向に向かっていくのか決まる。"},"32.1":{"code":"32.1","label":"筋肉","title":"雷天大壮","target":34,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["筋肉","雷天大壮","絶対間違えない"],"source_excerpt":"絶対間違えない\n「裏信長」の鋭角な見極めが、\n「筋肉」の方向に全力で動くと\nいうことは、この人が言うことに、絶対に間違いはない。\n確信を持った答えを発する、とても強い力。周りを圧倒する\nパワー。この力を前に、周りの人の反応は、\n「はい」か「YES」\nしかない。"},"32.2":{"code":"32.2","label":"和尚さん","title":"雷山小過","target":62,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["和尚さん","雷山小過","リーサルウエポン, 純粋なる経験"],"source_excerpt":"リーサルウエポン, 純粋なる経験\nこの人がそれをやるということは、その道を進む最終手段\nであり、\n「リーサルウエポン」\n「最終兵器」\n。スキルや戦略が非\n常に効果的で強力なものとなる。このプロセスが「純粋な\n経験」という意味。見えない世界のものを何とかして出して\nくる。"},"32.3":{"code":"32.3","label":"お母さん","title":"雷水解","target":40,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["お母さん","雷水解","裏天皇,ヤクザの親分,大親分,秘密結社"],"source_excerpt":"裏天皇,ヤクザの親分,大親分,秘密結社\n部長のうしろに会長、そういう裏の存在 。怖い存在、\n「裏の\n権力を持っている人」みたいなモノが見えてくる。雷が形に\nなっていて、その電波のホログラフィーには心があって喋っ\nている。そういうSF的なイメージをすれば、どんな人かは見\nえてくるはず。"},"32.4":{"code":"32.4","label":"イマジネーション","title":"地風升","target":46,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["イマジネーション","地風升","時の運 , 先行投資"],"source_excerpt":"時の運 , 先行投資\n忍術、戦術。先が見えるから戦闘に長けている。時の運とは、\n時の運を作り出す技術のことで、日本古来の戦闘術。\n「運が良\nかった」ではなくて、時の運を起こす為の何かを絶対やったっ\nてこと。それを読めた人がいる。だから、\n「先行投資」。そこを読\nめたらできるよってこと。"},"32.5":{"code":"32.5","label":"リスク中毒","title":"沢風大過","target":28,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["リスク中毒","沢風大過","時空の超越"],"source_excerpt":"時空の超越\n時・空間・場の超越は、これを使うとあっという間に簡単に\nできる。3Dプリンターみたいな感じ。時間と空間を圧縮するシ\nステムを使っているように見えるから、時空の超越した人。時\n空を超越するということは、データが圧縮して入っているってこ\nとと同じ。"},"32.6":{"code":"32.6","label":"養育","title":"火風鼎","target":50,"source_available":true,"source_pdf":"【25~32】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["養育","火風鼎","匠の人選 , 天才集団"],"source_excerpt":"匠の人選 , 天才集団\n最初から分かっているから、当然良い物を見極める力があり、\n人選や道具等が全部極まっている。湧いてくる正解を押し\n殺して、発言を我慢し、経験が足りていないと、肝臓を壊す。\n人を束ねて、技術を磨く方法を何度も経験しないと匠には\nならない。"},"33.1":{"code":"33.1","label":"ダビンチコード","title":"天火同人","target":13,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["ダビンチコード","天火同人","ごほうび,スポンサーとの出会い,新たな道"],"source_excerpt":"ごほうび,スポンサーとの出会い,新たな道\n「未知との遭遇」が、１番方向の「ダビンチコード」に向かう\nエネルギーは、自分にあげる「ご褒美」みたいな感じ。今ま\nで持っていなかった新しいものを与える。"},"33.2":{"code":"33.2","label":"魚群探知機","title":"天風姤","target":44,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["魚群探知機","天風姤","時空の扉 , 時間と空間の扉"],"source_excerpt":"時空の扉 , 時間と空間の扉\n人に遭遇し、時間と空間という、あなたが生きていく場が変\n化する点。新しい出会いや引っ越しとか、色んなことが重な\nり、新しい世界の扉を開ける。時間と空間、世の中の時空\nの扉。ファンタジーの世界じゃなくて、実際のあなたの世界\nで起きること。"},"33.3":{"code":"33.3","label":"マナー講師","title":"天地否","target":12,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["マナー講師","天地否","恋"],"source_excerpt":"恋\n新しい出会いとか、内側から噴き上がってくるものとか。\n「何\nで恋するの？」、それはこのエネルギーがあるから。\n「不幸で\nつまらない毎日から逃げ出した」\n「新しい世界が始まった」\nとか。恋は、新たな出会いを人に見せた状況。華やかで模範\n的な姿という意味。"},"33.4":{"code":"33.4","label":"セクシーダイナマイト","title":"風山漸","target":53,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["セクシーダイナマイト","風山漸","ふうーざんーぜん［セクシーダイナマイト］"],"source_excerpt":"ふうーざんーぜん［セクシーダイナマイト］"},"33.5":{"code":"33.5","label":"いとをかし","title":"火山旅","target":56,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["いとをかし","火山旅","人氣者,ずっとやりたいことが結実した日"],"source_excerpt":"人氣者,ずっとやりたいことが結実した日\n結実した日だから願いがかなった日。でも、結実しちゃって、\n平凡な刺激が足りない常態になるのはよくない。幸せ・愛・\nお金・健康な体・素晴らしい愛を持って旅をしている常態\nに、山が積み重なっていく。旅の向こう側にあるから、毎日\n同じ状況を積み重ねるルーティンではない。"},"33.6":{"code":"33.6","label":"広告担当","title":"沢山咸","target":31,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["広告担当","沢山咸","ヒーローインタビュー"],"source_excerpt":"ヒーローインタビュー\n何かが結実した向こう側で、\nたくさんの人に見られてる常態。\nそのイメージは、コスプレチックというか、漫画のキャラ\nクターに似せているような、華やかで印象的な常態。たくさ\nんの要素が折り重なって、\nみんなが楽しい常態だから、"},"34.1":{"code":"34.1","label":"裏信長","title":"雷風恒","target":32,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["裏信長","雷風恒","一夜城 , あげまん"],"source_excerpt":"一夜城 , あげまん\n「これしかない」という方向に、虎視眈々とロジカルに準備\nをしている。天才的な哲学スペックで、完璧な準備をして一\n氣に動かす。エネルギーが一氣に動くように相手や自分を調\n整しているから、他者にとっては、この人の存在自体が「何\nもかも上手くいかせてくれる人」になるから「あげまん」\n。"},"34.2":{"code":"34.2","label":"歓喜","title":"雷火豊","target":55,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["歓喜","雷火豊","大女優"],"source_excerpt":"大女優\n繰り広げられている壮大な人生から､考える暇もないくらい\n「何を切り取るのか？」をやっている。想い・経験値・スペッ\nクに、絶対的な計画や哲学がある。それを天才的に表現する\nから大女優。傍から見ると面白い程、\nドラマの世界に全力で\n入って我を忘れている。"},"34.3":{"code":"34.3","label":"ブラックシンデレラ","title":"雷沢帰妹","target":54,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["ブラックシンデレラ","雷沢帰妹","らいーたくーきまい［ブラックシンデレラ］"],"source_excerpt":"らいーたくーきまい［ブラックシンデレラ］"},"34.4":{"code":"34.4","label":"ヘルスケア","title":"地天泰","target":11,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["ヘルスケア","地天泰","ブラックジャック"],"source_excerpt":"ブラックジャック\n内部外部の全てをスキャンし、幸せや健康が続く為に、とん\nでもない手を使って、自分の肉体の外科的処置をする。も\nのすごい計算と、絶対的な経験値や想いの上で核心を突く\nので、 間違いようがない。絶対に壊れない叡智のデータバ\nンク。"},"34.5":{"code":"34.5","label":"ボイス","title":"沢天夬","target":43,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["ボイス","沢天夬","神の声,啓示, 内なる声に動かされている"],"source_excerpt":"神の声,啓示, 内なる声に動かされている\n内側の壮大な哲学が、全て表現されている常態だから「啓\n示」。自分の意志や意図で動くのではない。自分の声ではな\nく内なる声に具体的に動かされている常態。日常の生活を\n超えて、神に動かされている感じ。自我を超えるくらいのハ\nイパーに活性した常態。"},"34.6":{"code":"34.6","label":"太陽の化身","title":"火天大有","target":14,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["太陽の化身","火天大有","大成功, 聖人 , 収穫 , 収集家"],"source_excerpt":"大成功, 聖人 , 収穫 , 収集家\n何かに突き動かされて生きていると、天才とか神とか聖人\nと呼ばれる人になる。悟っていて、全てを持っていて、成功\nに至っている。全部持ってる、刈り取るという意味もある。\n「できないことがない」を突き抜けて、全てを持っている。\n自分の力ではないことを知っているから「聖人」。"},"35.1":{"code":"35.1","label":"相続","title":"火雷噬嗑","target":21,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["相続","火雷噬嗑","お金もうけ, やる氣スイッチ"],"source_excerpt":"お金もうけ, やる氣スイッチ\n「次いってみよう」の言葉で号令を出すエネルギーが、お金を\nいただく「相続」のほうを向いているということは、まさに、\n「お金もうけ」に直接つながってくるエネルギーになる。号令\nは「やる氣スイッチ」を入れることにもつながっている。"},"35.2":{"code":"35.2","label":"チャネラー","title":"火水未済","target":64,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["チャネラー","火水未済","言うたもん勝ち,ドリームズカムトゥルー"],"source_excerpt":"言うたもん勝ち,ドリームズカムトゥルー\n「次行ってみよう」という号令が、\n「チャネラー」という次の\n世界へ行くエネルギーに向いている。これはもう、\n「言うたも\nん勝ち」でしかない。次の世界に向かって号令を出すから、\n夢は叶う。想いは叶うから、\n「ドリームズカムトゥルー」。"},"35.3":{"code":"35.3","label":"いとをかし","title":"火山旅","target":56,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["いとをかし","火山旅","不思議なマッチング, 成立 , 世界七不思議"],"source_excerpt":"不思議なマッチング, 成立 , 世界七不思議\n「これとこれ普通だと合わないけど、凄く微妙にマッチして\nるね」みたいな感じ。\n「発明」\nみたいな意味合いもあるけれど、\n「七不思議」の方が意味合いは近いかも。この魔法を使うと、\nあり得ないものが成立する、あり得ないパートナーシップや\n結婚が成立する、そういう魔法の使い方ができる。"},"35.4":{"code":"35.4","label":"ゴットハンド","title":"山地剝","target":23,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["ゴットハンド","山地剝","コレクションアイテム,癒しグッズ,デザイナー"],"source_excerpt":"コレクションアイテム,癒しグッズ,デザイナー\nご当地キティのようなアイテムとか、ディアゴスティーニ\nのようなコレクションコンテンツとか、全部揃えたくなる\n「コレクションアイテム」\n。コツコツ重ねて全部買わせる。\nご当地キティを１ヶ所にまとめると、華やかで癒される感じ。\n描いたデザインが直ぐに形になっている感じ。"},"35.5":{"code":"35.5","label":"マナー講師","title":"天地否","target":12,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["マナー講師","天地否","永久欠番, 魔法学校,住宅展示場"],"source_excerpt":"永久欠番, 魔法学校,住宅展示場\nあなた以外はこの番号を使えません。大谷選手の 17 番みた\nいな感じ。\n「魔法学校」や「住宅展示場」は、理想が集まっ\nてきて、理想を形にする場であるという感覚 。場であり人\nであり、理想が陳列されている感じ。理想が背番号を背負っ\nて歩いてる、理想が見えている常態。"},"35.6":{"code":"35.6","label":"スーパースター","title":"雷地豫","target":16,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["スーパースター","雷地豫","リーダー,エンゲージメント,大劇場,有名メゾン"],"source_excerpt":"リーダー,エンゲージメント,大劇場,有名メゾン\n成立する、婚約、形になるという意味で「エンゲージメント」\n。\n良いものが全部見えている「大劇場」。カルティエやシャネル\n等の「有名メゾン」は、皆が憧れている物がひとつの場に集\nまっている感じ。\nそれの牽引役ということで「リーダー」。"},"36.1":{"code":"36.1","label":"体感覚","title":"地山謙","target":15,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["体感覚","地山謙","健康体操,ヨガ,ヨニケア, 漢方薬"],"source_excerpt":"健康体操,ヨガ,ヨニケア, 漢方薬\n人の氣持ちを動かす体感 。\n「これをやったら健康になった」\nを、受け入れるためのコンテンツ。\n「ヨガ」や、健康になる\nために大事なところをケアしましょうよ、という「ヨニケア」\nとか。要は、\n「大事なアソコ」のケアみたいな感じ。第１チャ\nクラからの感覚が来る。"},"36.2":{"code":"36.2","label":"ヘルスケア","title":"地天泰","target":11,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["ヘルスケア","地天泰","ご神託"],"source_excerpt":"ご神託\n神様の言葉が降りて、内容がその人を動かす言葉になって\nいる。\n「言われた人にちゃんと届いている」という意味で「ご\n神託」。他者のための言葉ではなく、その人のためにおりて\nきた言葉。\n「私たちの命が続いていく」という意味があるので、\n降ろされるのは健康と幸せの秘訣。"},"36.3":{"code":"36.3","label":"アーティスト","title":"地雷復","target":24,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["アーティスト","地雷復","出版, 人生創造 , 人を動かす言葉"],"source_excerpt":"出版, 人生創造 , 人を動かす言葉\n人を動かす言葉や、エモーショナルな生き方を、\nまとめて編集\nして出す。人に見せる。哲学書ではない。エモーショナルで、\n人が動くから人生創造。あなたの「はぁはぁしよう」という\n常態が、言葉によって相手に伝えられる。言葉によって人生\nを創る。"},"36.4":{"code":"36.4","label":"歓喜","title":"雷火豊","target":55,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["歓喜","雷火豊","愛を知る人 , 愛の讃歌 , 名曲"],"source_excerpt":"愛を知る人 , 愛の讃歌 , 名曲\nエモーショナルで、感情的なものが、相手に伝わった形だか\nら、「愛を知る人」。エモーショナルという見えないエネル\nギーが、だれかに伝わっていく形という意味で、\n「愛の賛歌」。\n言葉ではないエネルギーが、\nダイレクトに響き、"},"36.5":{"code":"36.5","label":"証人","title":"水火既済","target":63,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["証人","水火既済","動かした言葉 , 私の命"],"source_excerpt":"動かした言葉 , 私の命\nキング牧師が言った「I have a dream.」という名言。彼自\n身ではなくて、人々を動かした言葉のほう。私には夢（想い）\nがある、私は生きている。想いが無くなったら死んでいる。\n「私たちは光の存在」\n「私たちはひとつの命なのだ」という\n言葉。\n「私の命」みたいな意味合い。"},"36.6":{"code":"36.6","label":"社交界の華","title":"山火賁","target":22,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["社交界の華","山火賁","女神様, 女神, 女神像"],"source_excerpt":"女神様, 女神, 女神像\nあなたという存在が、何かするとか、言うとかではなく、\n存在そのものとしてそこに居るだけで、誰かに何かのエネ\nルギーが伝わる形。美しい、魅力的な、存在だから、\n「女神」\nであり、形としての「女神像」になる。"},"37.1":{"code":"37.1","label":"セクシーダイナマイト","title":"風山漸","target":53,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["セクシーダイナマイト","風山漸","ふうーざんーぜん［セクシーダイナマイト］"],"source_excerpt":"ふうーざんーぜん［セクシーダイナマイト］"},"37.2":{"code":"37.2","label":"人体実験","title":"風天小畜","target":9,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["人体実験","風天小畜","天狗のうちわ, 部長 , 座頭"],"source_excerpt":"天狗のうちわ, 部長 , 座頭\n非常に細やかな繋がりを作っていくオーガナイザー。優しいけ\nど、周りが見えないから、押し付けのキツい強いエネルギー。\n天狗のうちわの風は、攻撃にもなるし、場を入れ替える力。家\n族のような愛ある集団の中で、父親的なイニシアチブを持ち、\n一撃の風を吹かせる人。"},"37.3":{"code":"37.3","label":"引き際の魔術師","title":"風雷益","target":42,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["引き際の魔術師","風雷益","プロデュース"],"source_excerpt":"プロデュース\n「いいエネルギーを繋げて形にしていきましょう」という非常に\n生産的なエネルギー。\n「仲間と協力して何か一緒にやりましょ\nう」という仲間意識がベース。この人が動けば、躍進力という\nか推進力というのか、周りが自然に動き出す。ひとりの想いが\n推進力になっている形。"},"37.4":{"code":"37.4","label":"ダビンチコード","title":"天火同人","target":13,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["ダビンチコード","天火同人","聖典 , 教会 , バイブル"],"source_excerpt":"聖典 , 教会 , バイブル\n教会や聖典というのは、仲間が集まる場所。\n「これを持って、\nみんなでやりましょう」というバイブル。宗教観や信念をまとめ\nたもの。37 番の「風火家人」が持つエネルギーが「使える形」\nになると、教会とか、聖典とか、場が使える常態になる。"},"37.5":{"code":"37.5","label":"社交界の華","title":"山火賁","target":22,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["社交界の華","山火賁","正装"],"source_excerpt":"正装\n正式な場に出るための、オフィシャルのスタイル。この形であれ\nば、説明がなくても一目で意図が通じ、その場にいるみんなが\n「一緒だね」となる。\n「ちゃんとした、みんなの決まりのお洋服\nを着ましょう」というお約束が「正装」。"},"37.6":{"code":"37.6","label":"証人","title":"水火既済","target":63,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["証人","水火既済","宇宙計画 , 討論"],"source_excerpt":"宇宙計画 , 討論\n規模感がでかい、設計図・人体図・宇宙計画。普段の生活上\nのテーマではなく、\nもっと規模感のある新しい計画を議論する。\n仲間のエネルギーを使って新しいことを始めようとする力。\n今の地球上で、最も必要なエネルギー。ぶつけ合うという意味\n合いもあるから「討論」。"},"38.1":{"code":"38.1","label":"チャネラー","title":"火水未済","target":64,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["チャネラー","火水未済","栄光のあかし"],"source_excerpt":"栄光のあかし\nオリンピックの金メダルみたいなもの、大きな権威からもらった\n賞状みたいなもの、ノーベル賞みたいなもの。\n「栄光のあかし」\nとは、誰が見てもその価値がわかる象徴。そういう雰囲氣。番\n号を並べてみれば、箱の中で燃え上がっている感じがイメージ\nできると思います。"},"38.2":{"code":"38.2","label":"相続","title":"火雷噬嗑","target":21,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["相続","火雷噬嗑","ファイトマネー"],"source_excerpt":"ファイトマネー\n契約の中で頂けるお金。エネルギー単体では財産だけど、皆か\nら応援される状況で試合をし、みんなに見られてる環境の中で\n「こういう勝ち方をした君に」と、提案されるお金。非常に大き\nな動きをした人のエネルギーが具象化した結果の「ファイトマ\nネー」。"},"38.3":{"code":"38.3","label":"太陽の化身","title":"火天大有","target":14,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["太陽の化身","火天大有","スタントマン"],"source_excerpt":"スタントマン\n才能によって場が提供される。特集で組まれるようなスタント\nマン。ガテン系の俳優という意味じゃない。表には出てこない\n存在だけど、凄く応援されて、才能を命懸けで提供する。非常\nにアカデミックな場や、特殊な環境で評価され、仲間みんなか\nら祝福されている常態。"},"38.4":{"code":"38.4","label":"筆おろし専門","title":"山沢損","target":41,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["筆おろし専門","山沢損","映画予告"],"source_excerpt":"映画予告\n一番いいとこだけ見せる。いい意味のトラブルメーカー。その場\nを引っかき回すことによって、エネルギーチェンジを起こす。\nエネルギーを能動的に作っていく派手な表現活動。"},"38.5":{"code":"38.5","label":"自分への愛","title":"天沢履","target":10,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["自分への愛","天沢履","強敵と書いてトモと呼ぶ"],"source_excerpt":"強敵と書いてトモと呼ぶ\nアクション映画系のエネルギー。巨大資本や安定的な場が提\n供されている上でないと、この力は効かない。必ず、見られてい\nる環境かどうかを、確認していく必要がある。出来るだけアカ\nデミックな安定的な場で、自分への愛が供給されているかどうか\nがポイント。"},"38.6":{"code":"38.6","label":"ブラックシンデレラ","title":"雷沢帰妹","target":54,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["ブラックシンデレラ","雷沢帰妹","［ブラックシンデレラ］"],"source_excerpt":"［ブラックシンデレラ］\nらいーたくーきまい"},"39.1":{"code":"39.1","label":"証人","title":"水火既済","target":63,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["証人","水火既済","ザ・インパクト"],"source_excerpt":"ザ・インパクト\n信長の「比叡山焼き討ち」みたいに、\n「坊主が言うこと聞かな\nいなら全部焼け！」\n「えっ､宗教壊すの？？」という感じ。人々の\n氣持ちを、びっくりするぐらい破壊するという意味で「ザ・イ\nンパクト」。壊れていくモノに中途半端に関わっちゃダメ。心を\n寄せたり、一緒に文句を言ったりは、絶対ダメ。"},"39.2":{"code":"39.2","label":"黒魔術","title":"水風井","target":48,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["黒魔術","水風井","教訓, 見せしめ, 占いの創始者"],"source_excerpt":"教訓, 見せしめ, 占いの創始者\n「炎上商法」のエネルギーが、\n「黒魔術」の方向に動くと、\n「見せ\nしめ」というエネルギーになる。\n「教訓」として、\n「そんなことし\nたら、\nそうなるよ」という世界を作れる人。\n「占いの創始者」が、\n独自の世界を創るみたいな意味合い。"},"39.3":{"code":"39.3","label":"舞台監督","title":"水地比","target":8,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["舞台監督","水地比","メジャーリーグ,宇宙開発,美女コンテスト,指揮者"],"source_excerpt":"メジャーリーグ,宇宙開発,美女コンテスト,指揮者\nお金をかき集める所や、皆がざわついて心躍る場所を作ったり、\n演出する。\n「ここから先はこの人じゃないとダメ」っていう世界\nを作る。誰が本物かを、つまびらかに見せて、全体の総意で方\n向を決める。オーケストラの指揮者のように、"},"39.4":{"code":"39.4","label":"広告担当","title":"沢山咸","target":31,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["広告担当","沢山咸","スーパースター , 世界一"],"source_excerpt":"スーパースター , 世界一\n他の表現なら「宮廷浪漫」。中国や韓国の時代劇ドラマや、\n「ベルサイユのばら」みたいな宮廷ロマン。ダメになると、炎上\nして盛り上がる「炎上芸人」でもいい。\n「スーパースター」か？\n「炎上芸人」か？どっちで出ても綺麗に表現される。あとはレイ\nヤーの問題。"},"39.5":{"code":"39.5","label":"体感覚","title":"地山謙","target":15,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["体感覚","地山謙","世界の中心で愛を叫ぶ"],"source_excerpt":"世界の中心で愛を叫ぶ\n世界の中心は自分の中心。自分の内側から愛が沸き上がってく\nる常態。これは人から見えている常態。世界の中心で愛を叫ぶ\n＝自分の内側が吹き出している常態が、\n最も大事。新時代の鍵。\n易経の中でも、\nすごく鍵になる考え方。"},"39.6":{"code":"39.6","label":"セクシーダイナマイト","title":"風山漸","target":53,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["セクシーダイナマイト","風山漸","ふうーざんーぜん［セクシーダイナマイト］"],"source_excerpt":"ふうーざんーぜん［セクシーダイナマイト］"},"40.1":{"code":"40.1","label":"ブラックシンデレラ","title":"雷沢帰妹","target":54,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["ブラックシンデレラ","雷沢帰妹","らいーたくーきまい［ブラックシンデレラ］"],"source_excerpt":"らいーたくーきまい［ブラックシンデレラ］"},"40.2":{"code":"40.2","label":"スーパースター","title":"雷地豫","target":16,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["スーパースター","雷地豫","プロダクト"],"source_excerpt":"プロダクト\n有名ブランドのシリーズプロダクト。バックや化粧品、\n宝飾品等、\nプロダクト名自体が組織 。ひとつの想いの道がビルディング化\nしている常態。形にしていくことからスタートするのは、よろし\nくない。既に形のあるところや大きな資本があるところ、つま\nりハコがないと力が発揮できない。"},"40.3":{"code":"40.3","label":"裏信長","title":"雷風恒","target":32,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["裏信長","雷風恒","総裁 , サスティナブル"],"source_excerpt":"総裁 , サスティナブル\n刺激が入って永続できる、という意味での「サステナブル」\n。\n「総裁」は、ビックマザーの上級。権力者という意味ではなく、\n総仕切りをする人。社会の中での立ち位置。非常に母性的な\nドン。\n「首を絞めてでも連れていくよ」と、なかなか厳しいけ\nれど、その道を通れば間違いなく永続していける。"},"40.4":{"code":"40.4","label":"ご意見番","title":"地水師","target":7,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["ご意見番","地水師","ゴッドマザー,ママン,若手を導く母,寮母さん"],"source_excerpt":"ゴッドマザー,ママン,若手を導く母,寮母さん\nゴッドマザー、ママと呼ばれる人は神のような存在。\n「ゴッド\nマザー」は実の母ではなくて、象徴的な存在。産んだ人ではな\nくて、\n「寮母さん」みたいな、お母さんじゃないけど、お母さんっ\nて呼ばれている人。成功した人が、若いころから導いてくれた\nお母さんって呼ぶ人。"},"40.5":{"code":"40.5","label":"映画監督","title":"沢水困","target":47,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["映画監督","沢水困","ビジネスウーマン, 女監督, 社長職"],"source_excerpt":"ビジネスウーマン, 女監督, 社長職\n女社長じゃなくて、社長職。服装に特徴がある、あのホテルの\n社長みたいな感じ。剛腕な女の人の、\nトータルのイメージ。\n自分自身がタレントであり、営業職であり、会社の社長であり、\nプロダクトのリーダーであり、全てを兼ねている人みたいな意\n味合い。"},"40.6":{"code":"40.6","label":"チャネラー","title":"火水未済","target":64,"source_available":true,"source_pdf":"【33~40】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["チャネラー","火水未済","宇宙の父 , 大地の母"],"source_excerpt":"宇宙の父 , 大地の母\n「天のお父様、大地のお母さま」って、祈りで捧げるような文句\nですよね。象徴的な「祈るべき存在」\n「星になったご先祖様」\nみたいな意味で、想いを統べるような、大きい私達の懐であり\n潜在意識みたいな、かなり大きい存在。想いを馳せる星のよう\nな規模感。"},"41.1":{"code":"41.1","label":"頭脳派","title":"山水蒙","target":4,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["頭脳派","山水蒙","発見（物）"],"source_excerpt":"発見（物）\n, 考え方を見つけた\n発見というのは、\nずっと探していたものを「見つけたーー」っ\nていうエネルギー。見つけたものが、はっきりと目で見える\n常態。探していたものがそこにあった。実際に物理があった、\nまたは新しい概念が見つかった、というところまで、しっか\nりたどり着いているということ。"},"41.2":{"code":"41.2","label":"小鳥守","title":"山雷頤","target":27,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["小鳥守","山雷頤","命がけ,リアクション芸"],"source_excerpt":"命がけ,リアクション芸\n「命がけっぽく見える」だけでいい。その姿は、命がけ以上に\n命がけっぽく見える。期待されてバンジージャンプを飛ぶと、\n英雄になれる。ひとりでこっそりバンジージャンプしても意味は\nない。カメラに撮られている常態で「やりたくないよ〜」と言い\nながら落ちていくと、大きいギャラになる。"},"41.3":{"code":"41.3","label":"マグロ船の船長","title":"山天大畜","target":26,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["マグロ船の船長","山天大畜","TheWORLD, 人海戦術"],"source_excerpt":"TheWORLD, 人海戦術\n人を動かす力によって、世界を自分で使うことができる。\nこの力には必ず人が介入してるはずです。この力が発動す\nるのは、人のいる世界、大勢の人が集まっている場所、たく\nさんの才能が集まっている場所。人が誰もいないところで\nは使えない。"},"41.4":{"code":"41.4","label":"涙の最終ランナー","title":"火沢睽","target":38,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["涙の最終ランナー","火沢睽","テコの原理 , レバレッジ"],"source_excerpt":"テコの原理 , レバレッジ\n一点にたくさんのエネルギーを流し込むと、倍のエネルギー\nが使える感じ。みんなで盛り上がる為のエネルギーだから、\n皆で空氣を圧縮して、圧を掛けて飛ばす。先に力を入れてお\nくことで、最大効率を狙っていく。少ないお金で大きなリ\nターンを狙う「レバレッジ」と同じ。"},"41.5":{"code":"41.5","label":"宇宙のお注射","title":"風沢中孚","target":61,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["宇宙のお注射","風沢中孚","力点"],"source_excerpt":"力点\n力が綺麗に入って最大益になる。やろうとすることに対する\n力の点が解っている。この番号で生まれている人の力を借り\nれば、何をやってもうまく力が働く。使い方が凄く大切。よ\nく考えた上で、表現された姿を使っていくことが、すごく大\n事。"},"41.6":{"code":"41.6","label":"姐御","title":"地沢臨","target":19,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["姐御","地沢臨","株主"],"source_excerpt":"株主\n風雷益が強いエネルギーで広がって、帰ってくる。利益を受\nけ取るために氣軽に始めた株が、最終的に、予想以上の利益\nになって返ってくる。まわりまわって動いたエネルギーが、\n「最終的にあんたんとこに全部行くやん」っていうエネル\nギー。"},"42.1":{"code":"42.1","label":"わたくし史上最強","title":"風地観","target":20,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["わたくし史上最強","風地観","哲学者"],"source_excerpt":"哲学者\n人の「想い」がないと、私達はなにも形にすることができない。\n私が、この瞬間にキャッチした「想い」とはいったい何なのか？\nを突き詰めるエネルギー。キャッチした想いを形にするための\n研究の根本という意味で「哲学者」\n。"},"42.2":{"code":"42.2","label":"宇宙のお注射","title":"風沢中孚","target":61,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["宇宙のお注射","風沢中孚","新しい食品 , 遺伝子科学"],"source_excerpt":"新しい食品 , 遺伝子科学\nこのエネルギーは、抽象度が天井知らず。手に入れる収穫物\nは、私たちが消化できるものであり、いままでこの世界になかっ\nた新しく利用できるもの。受け取ったまったく新しいエネルギー\nを混ぜて、化学反応を起こし、形にしていく。"},"42.3":{"code":"42.3","label":"一緒だね","title":"風火家人","target":37,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["一緒だね","風火家人","物理の神様, 意成り, 稲荷大明神"],"source_excerpt":"物理の神様, 意成り, 稲荷大明神\nイナリは、\n「稲荷」\n「意成り」\n、自分の想いが成っている常態。\n神社は人間社会の中で、意が集まる場所として存在し、豊作\nを願い神社に行くと「私たちは同じ想いだね、一緒だね」と感\nじられる。神社に馳せる日本人のエネルギーは、同じ自然界の\n上にいる。"},"42.4":{"code":"42.4","label":"マスターオブラブ","title":"天雷无妄","target":25,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["マスターオブラブ","天雷无妄","サスティナブル,命の循環,継続する生命"],"source_excerpt":"サスティナブル,命の循環,継続する生命\nかなり象徴的で達観的。人間社会から一番遠い目線。キャッチ\nしたエネルギーが続いていくシステム。人間的な情緒を全て取\nり払って達観的に見た時に、生産や生命が継続する。絶える\nことのない生命のパターンが続いているってこと。継続のため\nに何をしていくか？が、物凄く大事。"},"42.5":{"code":"42.5","label":"小鳥守","title":"山雷頤","target":27,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["小鳥守","山雷頤","象徴的な存在,ブランド物,バーキン,名付け"],"source_excerpt":"象徴的な存在,ブランド物,バーキン,名付け\nバーキンというバッグの名前の由来は、ひとりの女優さん。そん\nな殿堂的なキャラクター。日本では「寅さん」\n。自分の命が大き\nな氣持ちの波となって、皆んなの記憶として刻まれ、非常に強\nい生産を生む。すごい最大益を生んでくれるもの。名前を付け\nるという意味合いもある。"},"42.6":{"code":"42.6","label":"産婆さん","title":"水雷屯","target":3,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["産婆さん","水雷屯","金のなる場,ハイブランドチェーン店"],"source_excerpt":"金のなる場,ハイブランドチェーン店\n風には、学問・心の波が束になっているみたいな意味があ\nる。高価な物を売る人たちを束ね、ひとつの思想や文化圏\nを引っ張る場という意味。金のなる場というのは、益を生\nむ農場とか、非常に哲学的な言葉や想いを抱えるラボ・研\n究室など、お金という作物が刈り取れる場。"},"43.1":{"code":"43.1","label":"リスク中毒","title":"沢風大過","target":28,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["リスク中毒","沢風大過","奥の手,火口,優先されている,優先順位１位"],"source_excerpt":"奥の手,火口,優先されている,優先順位１位\n記憶として知っていることに、自分に都合のいい意図を加\nえ、新しい扉を開ける。どうなるか解った上で、いま手に入\nれたいポジションを取るために、意思の点を打つ。それは\nハイリスクだし、やったことがないし、怖いけれど、"},"43.2":{"code":"43.2","label":"親分","title":"沢火革","target":49,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["親分","沢火革","大和魂 , やけくそ , どさくさ"],"source_excerpt":"大和魂 , やけくそ , どさくさ\n心の内側からでるボイス（啓示）に対して、自らの意を加えて\n表現する形。あなたと一緒に何かを成し遂げたいという強い想\nいの「大和魂」という機能。相手を弾圧してでも、殴ってでも、\n首絞めてでも、引きずり回してでも一緒に何かをしたいから、\n「やけくそ」\n「どさくさ」になる。"},"43.3":{"code":"43.3","label":"ランナーズハイ","title":"兌為沢","target":58,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["ランナーズハイ","兌為沢","幸せつづく,かっぱえびせん, 塩っけ"],"source_excerpt":"幸せつづく,かっぱえびせん, 塩っけ\n目で見たもの、集まってくるもの、何もかもが楽しくてたまらな\nいっていう常態だから「幸せつづく」。夢中でみんなで何かを\nする、みたいな感じがある。やめられないとまらない。なぜか凄\nくエネルギーが沸く。みんながみたら、何かが繋がり、行動さ\nせる。人をざわざわさせる。"},"43.4":{"code":"43.4","label":"遺伝子の型番","title":"水天需","target":5,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["遺伝子の型番","水天需","私のことば, 大御所"],"source_excerpt":"私のことば, 大御所\n楽しんで自分が望む方向性に意図を加えていくためには、肉体\nや、自分自身の型がしっかりしているのが大前提。ぐらついて\nいては無理。私が私であることを無視して、自分を明け渡して\nしまうと、全てが壊れる。\n「私のことば」というのは、自分自身\nが重要な鍵だという意味。"},"43.5":{"code":"43.5","label":"筋肉","title":"雷天大壮","target":34,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["筋肉","雷天大壮","氣合,呼吸の先生,呼氣 ,名指揮者"],"source_excerpt":"氣合,呼吸の先生,呼氣 ,名指揮者\nしっかりとした自分自身の常態で「自分が欲しいもの全部手\nに入れてやる」というのが「氣合い」。自分の真ん中に立ち、\n強い個性を表現できる常態になっていないと、\n氣合いは出ない。\n研ぎ澄まされた呼吸。指揮者が演奏者に押し付ける「こう弾\nいて・こう叩いて」という指示。"},"43.6":{"code":"43.6","label":"エンターティナー","title":"乾為天","target":1,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["エンターティナー","乾為天","思想家,本音と建て前,専門用語,星のや"],"source_excerpt":"思想家,本音と建て前,専門用語,星のや\n自分の内側の声をちゃんと理解したうえで、\n「今はこう言ってお\nいた方がいい」\nという選択がつくる世界。ラグジュアリーで、\nテー\nマパークみたいな異世界観を創り出すという意味で「星のや」。\n自分の本音とは別の、様々なコンセプトがある空間を創り出す。"},"44.1":{"code":"44.1","label":"エンターティナー","title":"乾為天","target":1,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["エンターティナー","乾為天","未来予知"],"source_excerpt":"未来予知\n望んだものが、\nどこに行けば手に入るかがわかる能力である「魚\n群探知機」が、人々の前で明らかに見せていく\n「エンターティ\nナー」の方向を向くということは、まさに人類のための「未来\n予知」。"},"44.2":{"code":"44.2","label":"未知との遭遇","title":"天山遯","target":33,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["未知との遭遇","天山遯","やることなすことうまくいく,ここ掘れワンワン"],"source_excerpt":"やることなすことうまくいく,ここ掘れワンワン\n「魚群探知機」が、人との出会いに関係する角度。人と関係し\nているということは、\n「やることなすこと上手くいく」ような、人\nとの出会い。もしくは「ここ掘れワンワン」という、ここに何か\nがあるってことが分かって、\nそれを誰かに伝えているということ。"},"44.3":{"code":"44.3","label":"境界線","title":"天水訟","target":6,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["境界線","天水訟","パーソナルブランディング,コンサルティング"],"source_excerpt":"パーソナルブランディング,コンサルティング\nだれか特定の人間の、個性を際立たせる指示を出すことができ\nるから、\n「パーソナルブランディング」。そういうことをテーマに、\n人と関わり、人と時間を使っていくので、\n「コンサルティング」。\nこの力を使えば、何でもできる。"},"44.4":{"code":"44.4","label":"刹那","title":"巽為風","target":57,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["刹那","巽為風","アートフェスティバル"],"source_excerpt":"アートフェスティバル\n死んだような日常を過ごしていることが人間にとっての死。\n食べるために働くという感覚では、あなたへのリターンは何も\n無い。表現のために何をするのか、あなたのアートを考えて。\nそれが「アートフェスティバル」。お祭りは、生きていくために\n絶対必要ではないけれど、それが私たちの全て。"},"44.5":{"code":"44.5","label":"養育","title":"火風鼎","target":50,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["養育","火風鼎","免疫ケアシステム，"],"source_excerpt":"免疫ケアシステム，\n母乳育児\n人間が元々持っているすごい強い「免疫ケアシステム」。何も\nしなくてもいいのが「いい常態」。要らないものが入ったから、\n鼻水が勝手に出る。\n「母乳育児」というのは、元々持っている\nシステム。人間関係も同様で、何かしなくちゃいけないではなく\nて「そのままでいい」ということ。"},"44.6":{"code":"44.6","label":"リスク中毒","title":"沢風大過","target":28,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["リスク中毒","沢風大過","蟲の声, タイムマシーン"],"source_excerpt":"蟲の声, タイムマシーン\n腹の虫、心の窓。言語処理 。左脳に届ける虫の声。お腹から\nの音。そういうことを感性で処理することができ、時空を圧縮\nする。太古から地球に漂っている、色んな人が味わい経験した\n周波数や声を、\n今現在の自分が掴んで「自分がどうしたいのか」\nに変えていくことができる力。"},"45.1":{"code":"45.1","label":"フィクサー","title":"沢雷随","target":17,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["フィクサー","沢雷随","イケメン専務,憧れの上司,人権指導家"],"source_excerpt":"イケメン専務,憧れの上司,人権指導家\n「お金にする」というエネルギーが、\n「フィクサー」にむくと、\n「憧れの上司」。仕事場であこがれの対象だから、ルックスも\n含めて仕事ができるかっこいい「イケメン専務」。実態はあ\nまり見えないけれど、生き様が格好いい人という意味で、\n「人権指導家」。"},"45.2":{"code":"45.2","label":"映画監督","title":"沢水困","target":47,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["映画監督","沢水困","コロッセオ,阪神タイガース,大イベント,曲芸"],"source_excerpt":"コロッセオ,阪神タイガース,大イベント,曲芸\n「コロッセオ」みたいな大会場で、いちごフェスタとか、人氣\nタレントを出すとか、みんながキャーキャー言うような場を\n作る。大人氣のサーカスの\n「曲芸」\n。\nスタジアムや球場のような、\n人が集まる所で、良いも悪いも盛り上がれる場を演出する。\n要素が増えれば増えるほど人が来る。"},"45.3":{"code":"45.3","label":"広告担当","title":"沢山咸","target":31,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["広告担当","沢山咸","ヤットデタマン"],"source_excerpt":"ヤットデタマン\nタイムボカンシリーズの「ヤットデタマン」。\n「何でそれに乗っ\nてきた？」\n「タイツがキラキラ」とか、格好いいけど、シュっとし\nていなくて、デコラティブが過ぎる。\n「もっと早く来いよ」と言い\nたくなるけど、来た瞬間には、みんなが「わぁ〜」って寄って\n来るような演出。期待されているし、人が集まる。"},"45.4":{"code":"45.4","label":"舞台監督","title":"水地比","target":8,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["舞台監督","水地比","メジャーコンテンツ"],"source_excerpt":"メジャーコンテンツ\n世の中に広く知れ渡っているという意味で、\n「メジャーコン\nテンツ」。エンターテイメントと言えば「テレビ」とか「舞台」\nのように、代名詞に近いメジャーなコンテンツ。時代によって\n変わってくるかもしれない。その時代のメジャーな、お金に\nなる、皆が見たいシリーズってこと。"},"45.5":{"code":"45.5","label":"スーパースター","title":"雷地豫","target":16,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["スーパースター","雷地豫","行列のできる〇〇,予約待ち,秘伝のたれ"],"source_excerpt":"行列のできる〇〇,予約待ち,秘伝のたれ\n「地」のエレメントは時間が重なっているから、\n「秘伝のタレ」\nは、最適な正しいコンパイル。\n「タレが良いから客が来る」\nみたいに、\n「予約待ち」\n「行列のできる」理由が増えてくる。\n作り手や設計者が居て、\nそいつがすごいってこと。ほかには、\n「最高年俸」\n「ギャランティー」\n「CM タレント」でもいい。"},"45.6":{"code":"45.6","label":"マナー講師","title":"天地否","target":12,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["マナー講師","天地否","先駆者, 決断力,ミニマリスト,クール"],"source_excerpt":"先駆者, 決断力,ミニマリスト,クール\n引き算でつくるカッコいいスタイルが、起業後の人氣プロダクト\nデザインみたいな感じ。全体的にスタイルを意味する。最初に\nそのスタイルを出した「先駆者」\n。クールでカッコ良くて、スタン\nダードとなれば売れる。数が関係してくる。"},"46.1":{"code":"46.1","label":"ヘルスケア","title":"地天泰","target":11,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["ヘルスケア","地天泰","永遠に続く幸せ"],"source_excerpt":"永遠に続く幸せ\n「イマジネーション」が、地天泰「ヘルスケア」の方へいくと、\nうまれてくるのは世界平和、エターナルライフ、穢れのない「永\n遠に続く幸せ」\n。\n「何かがあったからそうなった」ではなく、"},"46.2":{"code":"46.2","label":"体感覚","title":"地山謙","target":15,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["体感覚","地山謙","ハイパーラポール , 著名人"],"source_excerpt":"ハイパーラポール , 著名人\n協和や調整が一氣に完璧に共鳴して「愛さずにはいられない」\nという場にするエネルギー。海外の大学の研究で「著名人が\n出てくるだけでハイパーラポールを起こす」という結果が確認\nされている。ラポールが一氣に起こせるのは「著名人」。愛の\n形成、愛のコミュニケーション。"},"46.3":{"code":"46.3","label":"ご意見番","title":"地水師","target":7,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["ご意見番","地水師","しかけ風水,キーマン, 必須アイテム"],"source_excerpt":"しかけ風水,キーマン, 必須アイテム\n「こうしたい」というイメージに向かって、仕掛ける。魔法をかけ\nるときに技やグッズみたいなものを場に投じる。\n「災害が起こる」\nとなった時に、重機メーカーの株が上がるとか、先を予測し\n「この状況ならこれが必要」という答えを出す。"},"46.4":{"code":"46.4","label":"裏信長","title":"雷風恒","target":32,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["裏信長","雷風恒","天の岩戸開 , 先手必勝"],"source_excerpt":"天の岩戸開 , 先手必勝\n理想の場がどうなればいいのかが解っている。力業で外から\n天の岩戸を開けるのではなく、\n「ねぇちょっと何やってる\nの？ちょっと見せて」と、中から岩戸を開けさせる。光を見\nるために先手の発想で、未来から情報を持ってくる。自分を\n本当に愛すれば、人に幸せ持ってくることもできる。"},"46.5":{"code":"46.5","label":"黒魔術","title":"水風井","target":48,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["黒魔術","水風井","完品,サンプリング, 実行, 圧倒的緻密"],"source_excerpt":"完品,サンプリング, 実行, 圧倒的緻密\n色々実験したあげく完成し、配れる商品ができたっていうこと。\nもうちゃんとできてるってこと。未来と過去の両方を編むこと\nで、真似できないぐらいのデータ量があるから、圧倒的に緻密。\n計算して成り立ったものではなくて、答えそのものを下ろして\nくる。"},"46.6":{"code":"46.6","label":"完璧主義者","title":"山風蠱","target":18,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["完璧主義者","山風蠱","リアルＣＧ, 無敵,できないことがない"],"source_excerpt":"リアルＣＧ, 無敵,できないことがない\n完璧な設計図であり、完璧な「山」\n。地球上において、完璧な\n組織の中において、あなたが「やりたいな」と思ってできないこ\nとはない常態。\n「できないことがない」\n「敵がいない」\nという意味 。\n風のエレメントは人に関係する。誰かにあたる。やっぱり人と\n環境、時の場だよってこと。"},"47.1":{"code":"47.1","label":"ランナーズハイ","title":"兌為沢","target":58,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["ランナーズハイ","兌為沢","応援団 , 自作自演"],"source_excerpt":"応援団 , 自作自演\n「映画監督」が「ランナーズハイ」方向というのは、\n全力で叫び、\n歌い、踊る\n「応援団」。でも、試合には直接関係ない。応援団は、\n別になくてもいい。ところが、応援団のエネルギーによって、\n試合に勝ったり、負けたり、空氣が変わったりするほど、影響力\nがある。"},"47.2":{"code":"47.2","label":"お金にする","title":"沢地萃","target":45,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["お金にする","沢地萃","世界の黒澤,スポンサーがつく存在"],"source_excerpt":"世界の黒澤,スポンサーがつく存在\n人を呼べる人、人を集められる人。何もないところから形を\nなして、それを使って人が呼べる人、っていう意味。形を作れ\nる人、ちゃんとそこに人を集められる人物を指す。象徴的な人\nじゃなくて、実際にそういうことを成し遂げている人。人が集\nまるとお金になる。"},"47.3":{"code":"47.3","label":"リスク中毒","title":"沢風大過","target":28,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["リスク中毒","沢風大過","コスプレ力, 変装 ,フーテンの寅さん"],"source_excerpt":"コスプレ力, 変装 ,フーテンの寅さん\n映画の「フーテンの寅さん」。どこへ行っても食べていける\nし、コミュニケーションの達人で、自分を表現しきる。自分\nとのコミュニケーションを、生き様・有様で表現する力と\nいう意味で「コスプレ力」。皆が真似をするキャラ、パッと\n見て分かる個性的な表現で、危険を抜けて行ける。"},"47.4":{"code":"47.4","label":"引き寄せ","title":"坎為水","target":29,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["引き寄せ","坎為水","適材適所,ドレスコード, 馴染む"],"source_excerpt":"適材適所,ドレスコード, 馴染む\n「映画監督」のエネルギーが、\n「引き寄せ」の方向を向いて\nいるってことは、目の前に、絶対的にみんなを従わせるシ\nンクロニシティを起こし、受け取らせるってこと。"},"47.5":{"code":"47.5","label":"お母さん","title":"雷水解","target":40,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["お母さん","雷水解","ノゴーンベキ, 母親象"],"source_excerpt":"ノゴーンベキ, 母親象\n愛ゆえに突進するという意味。子象が危険にさらされた時の\n母親象は、世界を破壊する。途上国に飛び込んでいくお医者\nさんとか、砂漠の緑地化に立ち向かっている人とか。一人で\n行って愛を表現し切った歴史的人物。不可能を可能に変える、\n愛とエネルギーと力がある人。表現しきる力。"},"47.6":{"code":"47.6","label":"境界線","title":"天水訟","target":6,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["境界線","天水訟","アイデンティティクラッシュ"],"source_excerpt":"アイデンティティクラッシュ\nこうだと思っていたものが剥がれる瞬間に、新しい概念が始ま\nり、\n本来の道に戻る。自分自身が壊れるアイデンティティクラッシュ\nが起こるということは、\nその場があなたに合っていない、自分自\n身が表現できていない証拠。固執するものを剥がし、正しい道\nに戻す力。"},"48.1":{"code":"48.1","label":"遺伝子の型番","title":"水天需","target":5,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["遺伝子の型番","水天需","結論"],"source_excerpt":"結論\n「黒魔術」のエネルギーが、\n「遺伝子の型番」方向へ進むという\nことは、回り道はない。数ある選択肢の中から、一発で答えを\n出す。周りから見たら、\n「突然凄いなぁ、でも結果そうだよね」\nという感じで、\n「答えが出る」。そういう意味で「結論」のエネ\nルギーそのもの。"},"48.2":{"code":"48.2","label":"炎上商法","title":"水山蹇","target":39,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["炎上商法","水山蹇","裁判 , 地上げ屋 , ゼネコン"],"source_excerpt":"裁判 , 地上げ屋 , ゼネコン\n「山」が場なのでブランド感がある。何かが成り立つということ\nは、それを成す人のルールがあるということ。\n「地上げ屋」\n「ゼ\nネコン」とは、なんとしてでも動かしてやるみたいな力の強さ\nの表現。そこにいいも悪いもなく、\nただただ「裁判」になる常態。"},"48.3":{"code":"48.3","label":"引き寄せ","title":"坎為水","target":29,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["引き寄せ","坎為水","オラクルカード"],"source_excerpt":"オラクルカード\n見えないけれど自分の中にあるものが、オラクルカードを通し\nて見える。幸せの青い鳥を探す旅に出たが、結局すぐ近くに\nいたという童話のように、答えは自分の目の前にある。オラク\nルカードを引くことで、目の前に出てくる。ただし、あなたが想っ\nてることしか出てこない。"},"48.4":{"code":"48.4","label":"リスク中毒","title":"沢風大過","target":28,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["リスク中毒","沢風大過","高級車 ,キセキの抜け穴"],"source_excerpt":"高級車 ,キセキの抜け穴\n危ない所を通っていく時に、\nリムジンでなら通れるとか、コネを\n使うような「奇跡の抜け穴」。\n「鶴の一声」とか「こういう姿で\nいればOK」みたいな方法で、業界のドンのコスプレをしたり、\n高級車に乗ったりして、奇跡の穴を潜り抜ける。そう見えないか\nら先に見せる。"},"48.5":{"code":"48.5","label":"イマジネーション","title":"地風升","target":46,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["イマジネーション","地風升","ミラクル,プライベートジェット"],"source_excerpt":"ミラクル,プライベートジェット\n「ミラクル」というのは不可能が無いということ。行けないとこ\nろが無い「プライベートジェット」。ブラックカードも然り。\n「で\nきない」が辞書にはない。そこを掴んでほしい。"},"48.6":{"code":"48.6","label":"刹那","title":"巽為風","target":57,"source_available":true,"source_pdf":"【41~48】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["刹那","巽為風","エスパー , 超能力 , 美人"],"source_excerpt":"エスパー , 超能力 , 美人\n「黒魔術」が、風のエレメントの象徴である「刹那」のほうを\n向くエネルギーは「エスパー」。いつでも思い通りに「超能力」\nを使えるってこと。\n「美人」というのは、いかなるときも全部、\n自己内生産活動ができてる、そういう人。"},"49.1":{"code":"49.1","label":"広告担当","title":"沢山咸","target":31,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["広告担当","沢山咸","ナウシカ, エボシ様"],"source_excerpt":"ナウシカ, エボシ様\nポジションは、アニメのナウシカ。\n「置かれた立場」という、キャ\nラクターとしての意味。自分がそれでいることで、ひとつの役\n割をなす。今の自分のキャラクターや生き様には関係なく、救世\n主的ポジションというか、みんなを先導する、別のキャラクター\nの役目になっている。"},"49.2":{"code":"49.2","label":"ボイス","title":"沢天夬","target":43,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["ボイス","沢天夬","信念 , 宗教"],"source_excerpt":"信念 , 宗教\n信念は全て宗教。人と他人を分けるもの、お金があることも宗\n教です。\n「お金で色々なものが交換できる」という信念で「お\n金が儲かればみんなも幸せ」\n、これも宗教観 。自分の内側が\n想っていることが増え、\nみんなも同じだという感覚、"},"49.3":{"code":"49.3","label":"フィクサー","title":"沢雷随","target":17,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["フィクサー","沢雷随","社長"],"source_excerpt":"社長\nひとつの想念の形で、人の良いところを導いていく、統率能力\nが優れている。非常に冷静、且つスマートというのも特徴。\nサイコパスに社会性が加わり、\nドライだし利益重視で、その人の\n観念や信念に則って、ひとつの統率が引かれて、事が動いていく\nという意味。"},"49.4":{"code":"49.4","label":"証人","title":"水火既済","target":63,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["証人","水火既済","官僚"],"source_excerpt":"官僚\nチームのトップである社長がさらに進化すると、世直しが役目\nとなり、\n官僚のように国のための仕事をしたくなる。\nこの変化は、\n資本主義から社会主義へ、思想が変わるのに似ている。官僚\nとは国を動かす仕事なので、国民に言うことをきかせる側。"},"49.5":{"code":"49.5","label":"歓喜","title":"雷火豊","target":55,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["歓喜","雷火豊","親分 , 村長"],"source_excerpt":"親分 , 村長\n火のエネルギーが沢で増えた、それが極まった部族の一番\n上。日本人が理解しやすい言葉でいうなら「親分」。社長や\n官僚よりも、一番実入りが多いのは親分。その辺りが雷火豊\nの要素。"},"49.6":{"code":"49.6","label":"ダビンチコード","title":"天下同人","target":13,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["ダビンチコード","天下同人","十戒 ,モーゼと仲間たち, 新天地"],"source_excerpt":"十戒 ,モーゼと仲間たち, 新天地\n仲間を連れて、今いる場所から新しい土地に行くというエネル\nギー。\n「俺とお前達で生きていこう」という、いままでいた世界を\n新しく広げていく力。\n「火」のエネルギーそのもの。"},"50.1":{"code":"50.1","label":"太陽の化身","title":"火天大有","target":14,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["太陽の化身","火天大有","ファーム , 直営ビル, 特許"],"source_excerpt":"ファーム , 直営ビル, 特許\n権利物やプロダクトを使って営業する。ひとつのイニチアチブ\nを持って、動く集団であり場。フランチャイズのような感じ。\n自分をそこに持っていかないと働けない。時間と人と場が絡\nみ、その状況になっていれば、ヒット商品が生まれるし、人々\nはそこで働ける。みんなが食べられる場がある。"},"50.2":{"code":"50.2","label":"いとをかし","title":"火山旅","target":56,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["いとをかし","火山旅","人智バイブル , 認知脳科学"],"source_excerpt":"人智バイブル , 認知脳科学\n人海戦術で、人を動かすため、人が認識をかけるためのバイ\nブル。人を操るのではなく、人がどのように認識するのかと\nいうメソッドだから「認知脳科学」。皆で何か楽しいことを考\nえて人が氣持ちよく動いてもらうための場を起こす「プロダク\nトマネージャー」"},"50.3":{"code":"50.3","label":"チャネラー","title":"火水未済","target":64,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["チャネラー","火水未済","社訓, 朝礼"],"source_excerpt":"社訓, 朝礼\n弱音をみんなで喋れる場や、会社の朝礼の場などで、\n「心を\n一つにするにはどうしたらいいのか？」\n「どうやって人の心をま\nとめるのか？」などの法律やルールを出す。ひとりで決めるの\nではなく、\n「どのように人に見せて認知をかけるのか？」がポイ\nント。"},"50.4":{"code":"50.4","label":"完璧主義者","title":"山風蠱","target":18,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["完璧主義者","山風蠱","採用人事部長 , 当選確実"],"source_excerpt":"採用人事部長 , 当選確実\n「新卒採用で大きな会社に入り、今は人事の部長として採用に\n携わっております」みたいな人。\n「なべの中身をどう配るのか？」\n「皆に結果をどう見せるのか？」がポイント。絶対そこには周り\nの人が関係する。いつも「どうやって見せるのか？」を考えてい\nる人。"},"50.5":{"code":"50.5","label":"魚群探知機","title":"天風姤","target":44,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["魚群探知機","天風姤","国家元首"],"source_excerpt":"国家元首\n「養育」のエネルギーが「魚群探知機」を持つということは、\n「国家元首」であるということ。\n「養育」最大級の仕事を担\nうお役目。国によって表現は違っても、その国で一番トップ\nをとっている人という意味。比類なきリーダー。"},"50.6":{"code":"50.6","label":"裏信長","title":"雷風恒","target":32,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["裏信長","雷風恒","企業秘密"],"source_excerpt":"企業秘密\n「養育」の力が、\n「裏信長」に向くと、会社を守り、社員の命\nをつなぐため、見極めた方向へ、最強の策を一発で生み出\nせる。鋭角な答え以外は絶対に外に見せない。外部からし\nたらなぜその結果が得られたのか、プロセスが見えないので\n「企業秘密」\n。"},"51.1":{"code":"51.1","label":"スーパースター","title":"雷地豫","target":16,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["スーパースター","雷地豫","人氣ユーチューバー"],"source_excerpt":"人氣ユーチューバー\n人波をさらっていくとか、人波がついて来るというような意味\nが、すごく強い。受け取った強烈な振動が引っ張ってくれる。\n「地」は愛なので、人の愛が散らかる、愛が一氣に拡散する\n感じ。電波の中でひとつの大きなイデオロギーを取っていくと\nいう意味合い。"},"51.2":{"code":"51.2","label":"ブラックシンデレラ","title":"雷沢帰妹","target":54,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["ブラックシンデレラ","雷沢帰妹","らい−たく−きまい［ブラックシンデレラ］"],"source_excerpt":"らい−たく−きまい［ブラックシンデレラ］"},"51.3":{"code":"51.3","label":"歓喜","title":"雷火豊","target":55,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["歓喜","雷火豊","愛の電氣ウナギ"],"source_excerpt":"愛の電氣ウナギ\n何かの作品を作る時や、形に起こしていく時のアイコン。ビ\nリビリって痺れさせる。受け取る側が、悪いエネルギーと感\nじたのなら「敵」、愛であれば「夢や希望」となる。このエモー\nショナルなエネルギー信号が、\n「桃パフェ」みたいな強いヒット\n商品を作る要となる。"},"51.4":{"code":"51.4","label":"アーティスト","title":"地雷復","target":24,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["アーティスト","地雷復","最大インフラ"],"source_excerpt":"最大インフラ\n「龍の逆鱗」という豊かにするための刺激が、\n「アーティスト」\nの方向へいくと、\n「最大インフラ」となる。野球であればWBC\nのような、野球界の選手やチームを売るための一番メジャー\nなインフラ。誰もがそこを目指す、誰もが憧れの刺激的なイ\nンフラ。"},"51.5":{"code":"51.5","label":"フィクサー","title":"沢雷随","target":17,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["フィクサー","沢雷随","顕微鏡手術, PET 検査, MRI"],"source_excerpt":"顕微鏡手術, PET 検査, MRI\n最先端の精密機械。電氣信号で全体を見通し、命の繋がる\n方向に設計する。自分の人生を雑に扱うと、心のメルトダウン\nが起こる。\n「想い」こそが最大財産。自分のことを、"},"51.6":{"code":"51.6","label":"相続","title":"火雷噬嗑","target":21,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["相続","火雷噬嗑","玉音放送"],"source_excerpt":"玉音放送\n全員がひとつの想いに対して負けを認める瞬間の象徴が「玉\n音放送」。日本の霊性が打ち砕かれ、現代も薄れることなく、\n強烈な印象を残す。心に色濃く残る「記憶の最大値」"},"52.1":{"code":"52.1","label":"社交界の華","title":"山火賁","target":22,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["社交界の華","山火賁","ミセスマウテン,マダム , セレブ"],"source_excerpt":"ミセスマウテン,マダム , セレブ\n面白い物事、自分が欲しいもの、自分の人生を思い通りに\nするためのデータを、自分の人生に蓄えていて、それが溢れ\nてる常態。それが電氣信号で皆んなに見えている常態。セレ\nブがホテルのプールに入ってる「セレブインプール」\n。"},"52.2":{"code":"52.2","label":"完璧主義者","title":"山風蠱","target":18,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["完璧主義者","山風蠱","ブランド企業"],"source_excerpt":"ブランド企業\n皆さんが「あぁ知っている」という「ブランドの企業」。大きい\nプロダクト。たくさんの面白いものが噴き出すエネルギーが続い\nて、メンテナンスし続けている常態。長く続けたいものがあるの\nなら、メンテナンスはセット。ダメなとこを常に取り除き、常に\nいい常態にリセットされていると、大きくなっていく。"},"52.3":{"code":"52.3","label":"ゴットハンド","title":"山地剝","target":23,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["ゴットハンド","山地剝","味の素, 魔法のお粉, 科学者的見地,仮説 , 検証"],"source_excerpt":"味の素, 魔法のお粉, 科学者的見地,仮説 , 検証\n科学的見地や科学的立場を指す。仮説を立てて実験・検証\nすることや、それが出来上がった世界。見えないものを見え\nる化して、実験する。化粧品を売る時「毛穴を消す魔法の\nお粉」と言うと売れる。科学的見地が積み重なると、不思\n議なことを一瞬で作り出す世界を創る。"},"52.4":{"code":"52.4","label":"いとをかし","title":"火山旅","target":56,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["いとをかし","火山旅","ご当地キャラ,アニメグッズ , 駅弁"],"source_excerpt":"ご当地キャラ,アニメグッズ , 駅弁\n「この場所に必ずあるもの」という意味 。一言にまとめるのが\n難しい。\n「スタンダードメニュー」でもいいかも。例えば、神社\nに賽銭箱とか、神社に鳥居とか。お店なら、レジがあって、調\n理場があって、みたいな。駅には「駅弁」みたいな。駅には電\n車とか。そこの場に絶対あるもの。"},"52.5":{"code":"52.5","label":"セクシーダイナマイト","title":"風山漸","target":53,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["セクシーダイナマイト","風山漸","ト］"],"source_excerpt":"ト］\nふう−ざん−ぜん ［セクシーダイナマイ"},"52.6":{"code":"52.6","label":"体感覚","title":"地山謙","target":15,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["体感覚","地山謙","自然療法,ちょうど良い, 安定"],"source_excerpt":"自然療法,ちょうど良い, 安定\n「孵化の数秒前」のエネルギーが「体感覚」に向いている\nので、このエネルギーを例えると、蒟蒻湿布のような、昔か\nら効果があるといわれている「自然療法」。ずっと続いている\nという意味もあり、"},"53.1":{"code":"53.1","label":"一緒だね","title":"風火家人","target":37,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["一緒だね","風火家人","業界のドン"],"source_excerpt":"業界のドン\n表に出てこないホンマモンのドン。絶対に出てこない人 。\n「そ\nの人を見たら命があると思うな」ぐらいのホンマモン。イニシア\nチブを完全に持っている人。そいつが作った山の上にルールが\n乗っている。笑っていても激しい感情を持っていて、周りが言\nうことを聞かざるを得ないポジションにいる人。"},"53.2":{"code":"53.2","label":"刹那","title":"巽為風","target":57,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["刹那","巽為風","プロンプト, バズる, 風味"],"source_excerpt":"プロンプト, バズる, 風味\n「プロンプト」とは、方向性のこと。\n「その方向で行く」とか。\nこの新商品は、カボチャのスープ「風味」の方向でいこう！\nみたいな。チョコレートを売るときのキャッチコピーを、"},"53.3":{"code":"53.3","label":"わたくし史上最強","title":"風地観","target":20,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["わたくし史上最強","風地観","飛翔 , 箱庭 , 文壇 , 文豪"],"source_excerpt":"飛翔 , 箱庭 , 文壇 , 文豪\n舞い上がるみたいな意味で「飛翔」。ひとつの中に集約して\n世界が見えていて、外から眺めることができる「箱庭」\n。非\n常にアカデミックで、おめでたい感じ。整理したり、表現し\nたり、お願いしたり、眺めたりするための「箱」。\n「文豪」\nが集まっている「文壇」\n。"},"53.4":{"code":"53.4","label":"未知との遭遇","title":"天山遯","target":33,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["未知との遭遇","天山遯","十日戎 , ルーレット,おもてなし"],"source_excerpt":"十日戎 , ルーレット,おもてなし\nドキドキする方向性を決める。\n「セクシーダイナマイト」は、\nワクワクドキドキする方向性のこと。十日戎は「商売繁盛だ\nぜ！海老で鯛を釣るぜ！」そういう方向を作っていく、その\n方向に盛り上がっている常態。\nドキドキの「ルーレット」、\nわくわくする「おもてなし」。"},"53.5":{"code":"53.5","label":"孵化の数秒前","title":"艮為山","target":52,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["孵化の数秒前","艮為山","富士山 , 山の神 , 祟り"],"source_excerpt":"富士山 , 山の神 , 祟り\n日本と言えば富士山、山といえば富士山。\n「富士山」はセク\nシーで色っぽいと言われ、たくさんの人の心を動かす。反\n対に、山を削ろうとしたら「祟り」がくる。"},"53.6":{"code":"53.6","label":"炎上商法","title":"水山蹇","target":39,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["炎上商法","水山蹇","命の祭り"],"source_excerpt":"命の祭り\n宗教儀礼としての「命の祭り」。神事ではなくて、祭りに参\n加している人間側の話。祭りを奉納し、自分たちの「命」を\n見せ合い、その場をお祝いし、場が盛り上がっている。豊作\nの祭りができて良かったね。続くといいね。命の祭りを色\nんな人に見てもらう。命が重なっていく。"},"54.1":{"code":"54.1","label":"お母さん","title":"雷水解","target":40,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["お母さん","雷水解","アイドルユニットのセンター"],"source_excerpt":"アイドルユニットのセンター\nアイドルユニットのセンターというポジションは、アイドルなら\n誰でもあこがれる役割。ど真ん中で人目を惹く役割の広告\n用。その時流の売れ線。これからがっつり稼いでくれるス\nター候補として、ピカピカに磨いて、メジャーの世界へ送り\n出す。"},"54.2":{"code":"54.2","label":"龍の逆鱗","title":"震為雷","target":51,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["龍の逆鱗","震為雷","刺激的"],"source_excerpt":"刺激的\n望む世界を手に入れるための戦略において、行動に起こし、\n狙った刺激が、すごく効果的に出ているという意味で「刺激\n的」。すごく鮮やかで目を引く、または心に強く訴えるビビット\nな感じ。"},"54.3":{"code":"54.3","label":"筋肉","title":"雷天大壮","target":34,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["筋肉","雷天大壮","夢を叶える者"],"source_excerpt":"夢を叶える者\n「夢が叶った者」ではなくて、\n「夢を叶える者という役割があ\nる常態」ってこと。実際に行動を起こして夢に向かって努力\nするのではなくて、思想やビジュアルみたいなふんわりした\n感覚、どっちかっていうと、広告用みたいなバーチャルでアプ\nローチする感じが強い。"},"54.4":{"code":"54.4","label":"姐御","title":"地沢臨","target":19,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["姐御","地沢臨","看板女優"],"source_excerpt":"看板女優\n元がブラックシンデレラだから、優しい女優ではない、エネ\nルギー大きめ。\n「あなたが前に出たら、スポンサーがお金く\nれる」という常態。看板女優である自分も儲かるし、周りも\n儲かっていく。受け取っている環境が出来ている。周りに対\nして商品としての自分。"},"54.5":{"code":"54.5","label":"ランナーズハイ","title":"兌為沢","target":58,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["ランナーズハイ","兌為沢","紀伊国屋文左衛門"],"source_excerpt":"紀伊国屋文左衛門\n江戸時代の豪商。お金持ちの象徴。金遣いが非常に派手で、\nお金をばらまき、明るくて遊び上手。要らないものは切る。\n自分のルールで世界を創り上げ、\n「使っても使っても金は無く\nならん。人生を楽しめ〜」という常態にいる。楽しいだけの\n状況。"},"54.6":{"code":"54.6","label":"涙の最終ランナー","title":"火沢睽","target":38,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["涙の最終ランナー","火沢睽","ＣＭ,流行りのタレント, 成り上がり者"],"source_excerpt":"ＣＭ,流行りのタレント, 成り上がり者\n戦略を派手に見せて人々の注意を集めていく方向性なので、\nメディアに大きく出るポジションや、印象に残るコマーシャル\nとか、広告業界で活躍する流行りのタレントのような感じ。\n短期間で大成功をおさめ目立っている「成り上がり者」。"},"55.1":{"code":"55.1","label":"和尚さん","title":"雷山小過","target":62,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["和尚さん","雷山小過","所有権 , 形あるもの"],"source_excerpt":"所有権 , 形あるもの\n山の要素がベースになるので、\n「すでに持っています」みたい\nな感じ。最初から持っている、そこに当たり前にある権利だか\nら「所有権」。この地球上に最初からあった、自分が使える\nすべての「形あるもの」。"},"55.2":{"code":"55.2","label":"筋肉","title":"雷天大壮","target":34,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["筋肉","雷天大壮","愛のうた,ドラマ,ドキュメンタリー"],"source_excerpt":"愛のうた,ドラマ,ドキュメンタリー\nエネルギーだけで見ると、\nドラマの渦中で流れる「愛のうた」。\n人と人がぶつかって訴えている瞬間、心と心のやりとりという\n意味で「ドキュメンタリー」。流行っていて売れているテレビド\nラマや映画。全ての人たちが演技をし、表現をしたりする場。\n非常に生産が極まった形。"},"55.3":{"code":"55.3","label":"龍の逆鱗","title":"震為雷","target":51,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["龍の逆鱗","震為雷","降臨（神がおりてくる）"],"source_excerpt":"降臨（神がおりてくる）\n,雷\n単純に言うと「ビビビ」。神の降臨、雷のようなものをキャッチ\nして行動する感覚。呪われた好奇心を背負って、\n「ビビビ」を\n求めていけば、大体のものは形になる。その代わり「人が心で\n死んでいる」みたいなことが、周りで起こるかも。やれる状況\nならやってみて。神に成る ( 神成り)。"},"55.4":{"code":"55.4","label":"はぁはぁしよっ","title":"地火明夷","target":36,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["はぁはぁしよっ","地火明夷","スター俳優 , ヒット曲 , アバター"],"source_excerpt":"スター俳優 , ヒット曲 , アバター\n表現されたドラマチックな世界。誰かが求めていること。物が\n作られるには、想いと想いがぶつかって何かが起こって、それ\nを誰かが観測している今があるということ。スター俳優やアバ\nターは、誰かの想いの箱。非常にタレント力のあるエネルギー。\n演技者というか、\nアバターの感じ。"},"55.5":{"code":"55.5","label":"親分","title":"沢火革","target":49,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["親分","沢火革","地球創造主 , 地球君主の神, 神聖"],"source_excerpt":"地球創造主 , 地球君主の神, 神聖\n光が形になって見えた瞬間の、非常に象徴的存在。神聖なる\n存在・創造主というような、でっかい「ひとつの私達」が生\nまれる。この番号は今上陛下の太陽でもある。日本の象徴と\nいうマインド。誰かが誰かの命の象徴であり、人間そのもの\nが神の象徴という意味。"},"55.6":{"code":"55.6","label":"呪われた好奇心","title":"離為火","target":30,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["呪われた好奇心","離為火","ダイヤモンド, 唯一無二 , 価値"],"source_excerpt":"ダイヤモンド, 唯一無二 , 価値\n好奇心そのままに動き、\nそれが形になった。形になったとこ\nろは広がっていく。あなたという唯一無二が何を受取ったの\nか、万物共通の価値として、人類みんなが使えるものになった。\n物理に関係してくる。\nだれもが認める「価値」。"},"56.1":{"code":"56.1","label":"呪われた好奇心","title":"離為火","target":30,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["呪われた好奇心","離為火","歴史人物"],"source_excerpt":"歴史人物\n時代劇とか歴史ドラマ。大河ドラマに出てくる「歴史人物」\nみたいなもの。国内でドラマがバズった後、そこから世界的\nに有名になって名を残していく「歴史人物」\n。何かでバズった\n後に、世界シェアになったもの、若しくはその常態 。"},"56.2":{"code":"56.2","label":"養育","title":"火風鼎","target":50,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["養育","火風鼎","才覚者 , 一代で大企業"],"source_excerpt":"才覚者 , 一代で大企業\n「いとをかし」のエネルギーが、\n「養育」方向に向くと、\n「才\n覚者」。才覚者とは、あらゆる局面において機転がきき、優秀\nな才智で事業を牽引する者。一代でブランド企業を築き上\nげ、大企業に育てた、プロダクトのリーダーである「才覚者」。\nその人を指す。"},"56.3":{"code":"56.3","label":"次行ってみよう","title":"火地晋","target":35,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["次行ってみよう","火地晋","説得力, 自分を信頼する力, 巨匠"],"source_excerpt":"説得力, 自分を信頼する力, 巨匠\n「自分を信頼する力」のある人は、人を説得する力がある、\nどんなことでも形にする力がある、みたいなこと。\n「巨匠」み\nたいな姿でいることで説得力がある。堂々とした巨匠のエネ\nルギーを出しているからこそ、周りが言う事を聞いてくれる。\n「国営放送」\n「形にする」"},"56.4":{"code":"56.4","label":"孵化の数秒前","title":"艮為山","target":52,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["孵化の数秒前","艮為山","冠番組"],"source_excerpt":"冠番組\nその人のタレント性のエネルギーが、番組の方向を決め、コ\nンテンツの色になり、その人そのものが世界観になっている\n常態。その人の名前がついている番組が、\n「冠番組」"},"56.5":{"code":"56.5","label":"未知との遭遇","title":"天山遯","target":33,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["未知との遭遇","天山遯","天命 , 出会い"],"source_excerpt":"天命 , 出会い\n人生は常に移り変わる。すべてを持っている前提で、何にも固\n執せずに旅を続けている常態。その旅での「天命」\n「出会い」\n。\n人はみな旅人。山に固執せずに歩いていくことが、あなたの\n山を積み上げていく。山における易経からのメッセージを伝\nえてくれてるように見える。"},"56.6":{"code":"56.6","label":"和尚さん","title":"雷山小過","target":62,"source_available":true,"source_pdf":"【49~56】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["和尚さん","雷山小過","空海 , 宇宙の理を説く人 , 坊主"],"source_excerpt":"空海 , 宇宙の理を説く人 , 坊主\n「いとをかし」のエネルギーで、\n「和尚さん」をしゃべる人 。\nこの世の仕組みを探求し続け、その真理を伝え続けた「空海」\nであり、今も全国のお寺でそれを続けている「坊主」であり、\n宇宙の理を解く人。歴史のなかで、それを積み上げてきた、\nまさに山のエネルギー。"},"57.1":{"code":"57.1","label":"人体実験","title":"風天小畜","target":9,"source_available":true,"sou

rce_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["人体実験","風天小畜","風の魔術師,草薙の剣,モーゼの杖"],"source_excerpt":"風の魔術師,草薙の剣,モーゼの杖\n時と場を操る力、人を操る力、物凄く細かい設計。霊的な剣の\nようだから「草薙の剣」。自分の内側の声を形にしながら、\n見えない剣を使って世の中を作る。モーゼは、杖をドンッっ\nて突いたら海が割れる、\nそこに深い意味が組み込まれている。\n風だからできないことがない。"},"57.2":{"code":"57.2","label":"セクシーダイナマイト","title":"風山漸","target":53,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["セクシーダイナマイト","風山漸","ト］"],"source_excerpt":"ト］\nふう−ざん−ぜん［セクシーダイナマイ"},"57.3":{"code":"57.3","label":"色氣","title":"風水渙","target":59,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["色氣","風水渙","スター犬"],"source_excerpt":"スター犬\n心の紐が緩むと、財布の紐も緩むのが人間。そんな風に感情を\n操作する力。決まった心の動きではなく、何か行動を起こすた\nめに微生物たちを総動員させて、物凄く速いスピードで人の心\nを操作する。蟲の働きのエネルギー。この人がいれば場が和む\nから、携帯電話ＣＭの白い犬みたいな「スター犬」\n。"},"57.4":{"code":"57.4","label":"魚群探知機","title":"天風姤","target":44,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["魚群探知機","天風姤","わたしの道 ,マイフェアレディ"],"source_excerpt":"わたしの道 ,マイフェアレディ\n一番小さい振動。世の中で起こる事は、すべて私の内側の\n形のひとつ。あなたの内側に答えがある。それが「わたしの\n道」。私は、自分の内側の声を聴いて私の道を進んでいる、\nという常態。あなたの世界は、あなたの中にある全ての機構\nであるということを認知すること。"},"57.5":{"code":"57.5","label":"完璧主義者","title":"山風蠱","target":18,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["完璧主義者","山風蠱","完全インフラ, 一夜城"],"source_excerpt":"完全インフラ, 一夜城\n圧倒的権力の為に、オートメーションの全て、設計の全て、\n「完全インフラ」を作れということ。完璧にそうなるための何\nかがあればそれができる。\nそれができる為の全てを用意する\nことでもある。逆に、完全インフラがあれば、圧倒的権力が\n手に入るということでもある。"},"57.6":{"code":"57.6","label":"黒魔術","title":"水風井","target":48,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["黒魔術","水風井","伝説の名器のバイオリン"],"source_excerpt":"伝説の名器のバイオリン\n「刹那」が「黒魔術」の方向というのは、時空を超えるという\nこと。音速や、赤外線通信のように、圧縮してデータを飛ば\nすという意味。ベートーベンと同じ時代の音である、ストラ\nディバリウス（バイオリン）の音色を聞くと、"},"58.1":{"code":"58.1","label":"映画監督","title":"沢水困","target":47,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["映画監督","沢水困","祭祀"],"source_excerpt":"祭祀\n国の命運をわける重要な儀式としての「祭祀」。その世界を取\nり仕切っている人。タロットカードのキングみたいな大きな影響\n力を象徴した意味合い。優秀な裁判官のような政（まつりごと）\nを執り行う人。"},"58.2":{"code":"58.2","label":"フィクサー","title":"沢雷随","target":17,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["フィクサー","沢雷随","神父"],"source_excerpt":"神父\n神父は前頁の「祭祀」と違って、パーソナルに寄っているイメー\nジ。\n「ランナーズハイ」が「フィクサー」方向へ、という意味で、\n付き添って一緒に走ってくれる人 。同じ世界を一緒に味わって\nくれる、若しくは創ってくれる人。"},"58.3":{"code":"58.3","label":"ボイス","title":"沢天夬","target":43,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["ボイス","沢天夬","おみくじ , 神社"],"source_excerpt":"おみくじ , 神社\n「ランナーズハイ」が「ボイス」の方向に向くと、喜びが満\nち溢れる幸せな常態からの「啓示」のような、「ご神託」\nのようなイメージ。具体的に形にするなら、\n「おみくじ」とか、\n「神社」となる。天国か地獄かを分ける。"},"58.4":{"code":"58.4","label":"地球の浣腸","title":"水沢節","target":60,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["地球の浣腸","水沢節","権力者"],"source_excerpt":"権力者\n「ランナーズハイ」が、\n「地球の浣腸」に向いている常態は、\n本当に強いエネルギーです。アドレナリンが出続けて「楽し\nい」がずっと振動して広がり続けているいる常態の、\n権力者。"},"58.5":{"code":"58.5","label":"ブラックシンデレラ","title":"雷沢帰妹","target":54,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["ブラックシンデレラ","雷沢帰妹","らい−たく−きまい［ブラックシンデレラ］"],"source_excerpt":"らい−たく−きまい［ブラックシンデレラ］"},"58.6":{"code":"58.6","label":"自分への愛","title":"天沢履","target":10,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["自分への愛","天沢履","自己愛"],"source_excerpt":"自己愛\n自分自身を愛している常態があることで、自由な姿が、\nものす\nごく楽しそうに見えている常態。自己愛がとても楽しい常態。\n小さい規模にならないように注意。RIKA と HINKAで「山」\nと「風」が極まった常態から、\n「沢」の「楽しい」が極まってい\nるという規模感を忘れずに。"},"59.1":{"code":"59.1","label":"宇宙のお注射","title":"風沢中孚","target":61,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["宇宙のお注射","風沢中孚","魂の命 , 心の生き方, 心の生まれ方"],"source_excerpt":"魂の命 , 心の生き方, 心の生まれ方\n魂が命なのではなく、\n私たちの魂には命がある。魂は空っぽで、\nその中に命を吹き込むという意味合い。私たちは魂の器。器＝\n人間という形があって、そこに、地球上に散らかっているニュー\nトリノによって遺伝子が設計され、私という個の形になるという\nのが命の生まれ方。"},"59.2":{"code":"59.2","label":"わたくし史上最強","title":"風地観","target":20,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["わたくし史上最強","風地観","伝説のキャバ嬢 , 天鈿女命"],"source_excerpt":"伝説のキャバ嬢 , 天鈿女命\n誘惑するすごいやつみたいな感じ。天鈿女命（アメノウズメノミ\nコト）は、天の岩戸の前で乳房を出して踊り、岩戸の中にいた\n天照大御神が、\n「ちょっと何それ見てみたい」と、うっかり出て\nきた。色んな人たちをウッカリさせてしまうくらいの、派手なパ\nフォーマンスってこと。\n「うっかりさせる」\nという意味。"},"59.3":{"code":"59.3","label":"刹那","title":"巽為風","target":57,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["刹那","巽為風","笑顔 , とほかみえみため"],"source_excerpt":"笑顔 , とほかみえみため\n微笑みじゃない、笑うじゃない、\n「笑顔」\n。笑顔が出ている\n常態。祝詞の「とほかみえみため」みたいなエネルギー。\nどこかで、誰かが幸せな常態と観測されている。皆が「ふ\nわっ」と笑っている状況がある。その常態の意味合いは\n「笑顔」。"},"59.4":{"code":"59.4","label":"境界線","title":"天水訟","target":6,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["境界線","天水訟","結合,化学反応,名コンビ,伝説のコンビ"],"source_excerpt":"結合,化学反応,名コンビ,伝説のコンビ\n「色氣」が「境界線」のほうへ向くと、\nくっつくって意味合いで、\n「結合」\n。結合というのは「化学反応」。常に何かを繋げてい\nくような力。\n「名コンビ」\n「伝説のコンビ」のように、くっついたか\nらこそ、そこに生まれる、生産的な力強いエネルギー。"},"59.5":{"code":"59.5","label":"頭脳派","title":"山水蒙","target":4,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["頭脳派","山水蒙","女王蜂"],"source_excerpt":"女王蜂\n女王蜂は巣から一人で出られない。最初はただの蜂だったの\nに、女王蜂になった瞬間デブになって、子作りだけをする。エ\nサも何もかも豊かに全部もらえるけど、巣からは出られない、\nその仕事しかさせてもらえないっていう、女王蜂。"},"59.6":{"code":"59.6","label":"引き寄せ","title":"坎為水","target":29,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["引き寄せ","坎為水","没入,仮面舞踏会,雄叫び,核爆弾,座長"],"source_excerpt":"没入,仮面舞踏会,雄叫び,核爆弾,座長\n参加者の正体がわからない「仮面舞踏会」。中に籠る「没入」。\n中に籠ったものが外に出て「雄叫び」\n「核爆弾」。それが表現さ\nれたら「座長」。常態によって表現が違う。常態を自分の中に\n隠して籠っているから、見えている表面はいかようにも変身で\nきるという意味で、\n「仮面舞踏会」。"},"60.1":{"code":"60.1","label":"引き寄せ","title":"坎為水","target":29,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["引き寄せ","坎為水","天然素材"],"source_excerpt":"天然素材\n価値あるものの形のこと。自らがルールであるというエネル\nギーの最高のお手本、大自然からの恵みや天然のシステム\nは、無数の生命が奇跡のような調和で美しく素晴らしいも\nのを生み出し、完璧なシステムで、そのすべての営みが人々\nの道しるべとなる。"},"60.2":{"code":"60.2","label":"産婆さん","title":"水雷屯","target":3,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["産婆さん","水雷屯","えびすさま"],"source_excerpt":"えびすさま\n日本神話の中で、えびすさま\n（ヒルコ）は、奇形で生まれたと\n言われているのに、幸せの全てを持っていて、人々に豊かさ\nを与えてくれる縁起がいい神様。この番号の人たちには、\n神がかっている感じ、ありがたい感じがある。"},"60.3":{"code":"60.3","label":"遺伝子の型番","title":"水天需","target":5,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["遺伝子の型番","水天需","ご本尊 , 権力に座している"],"source_excerpt":"ご本尊 , 権力に座している\nご本尊なので、有難い感じ。本人にご本尊っぽい感じがある\nと、周りから「凄くアカデミックに上手くいってらっしゃるん\nだな」っていう常態に見られたり、自分が売れていたり、凄く\n大切にされている。"},"60.4":{"code":"60.4","label":"ランナーズハイ","title":"兌為沢","target":58,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["ランナーズハイ","兌為沢","ヒットコンテンツ"],"source_excerpt":"ヒットコンテンツ\n「何やってもウケますわ〜」って感じ。\n「権力者ってあなたみた\nいな人のことよね」みたいな権力の権化。\n「それっぽいが過\nぎる」みたいな感じで、有難いっぽいとか、お金持ちっぽい\nとか、\nちょっとちゃかしている常態の方がよく動くエネルギー。"},"60.5":{"code":"60.5","label":"姐御","title":"地沢臨","target":19,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["姐御","地沢臨","ロイヤリティ, 福利厚生"],"source_excerpt":"ロイヤリティ, 福利厚生\n方向として受け取れる、貰える感じ。本人は色々工夫してい\nるけど、なにをやっても結局安定的にもらえます。アカデミック\nなところからサポートされて受け取れるエネルギー。\n「交渉」\nという意味も含まれているので、結構社会的な背景という意\n味もある。"},"60.6":{"code":"60.6","label":"宇宙のお注射","title":"風沢中孚","target":61,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["宇宙のお注射","風沢中孚","天下人"],"source_excerpt":"天下人\n百姓出身の太閤秀吉が、人々に「自分は凄い天下人だ」と見\nせつけるために、凄い名前を付ける・大きい兜を付ける・華\n美な装飾で着飾る等の、自分大きく見せる戦略を使った。\n権力が広がる常態として、銅像が立つとか、天下人とか、"},"61.1":{"code":"61.1","label":"色氣","title":"風水渙","target":59,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["色氣","風水渙","天帝"],"source_excerpt":"天帝\nこの人が売れてますみたいな感じ。タレント業界用語としての\n「天帝」。天地・万物を支配する神になぞらえて、\nすべてを握っ\nている万能の権力者で、何でもできる存在という意味。"},"61.2":{"code":"61.2","label":"引き際の魔術師","title":"風雷益","target":42,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["引き際の魔術師","風雷益","新薬"],"source_excerpt":"新薬\n実際に今ある新薬の良いとか悪いとかのイメージではなく、\n特定のトラブル時に、新しい発想として出てきたもの。世界\n最先端のものって良い悪いじゃないんですよ。この新薬の意\n味は、\nこれからの時代に凄く面白い深い意味のコンパイル。"},"61.3":{"code":"61.3","label":"人体実験","title":"風天小畜","target":9,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["人体実験","風天小畜","領域展開,NASＡ宇宙局,科学研究所"],"source_excerpt":"領域展開,NASＡ宇宙局,科学研究所\n専門的な研究所や、専門が集まる拠点というような感じ。\n宇宙のお注射（風沢中孚）を引き際の魔術師（風雷益）で受\nけ取るから、絶対的に未知の人体実験。エネルギーを切り\n取っては、実験を繰り返す拠点。"},"61.4":{"code":"61.4","label":"自分への愛","title":"天沢履","target":10,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["自分への愛","天沢履","地下アイドル,アニメキャラ"],"source_excerpt":"地下アイドル,アニメキャラ\n「宇宙のお注射」が「自分への愛」へ向かうと、２次元アイド\nルのような、手に取れないファンタジックな妖精みたいな感じ\nになる。地下アイドルや、アニメキャラがいる異世界を自分の\nイメージで創り出し、\nそこに住む自分への愛。"},"61.5":{"code":"61.5","label":"筆おろし専門","title":"山沢損","target":41,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["筆おろし専門","山沢損","天才スイッチャー, 人工衛星はやぶさ"],"source_excerpt":"天才スイッチャー, 人工衛星はやぶさ\n地球へ帰って大氣圏で燃えて消えた、あの惑星探査機はやぶ\nさ。意図して見ようとしないと見えないものが、確かに見えた\n瞬間。圧縮してきたエネルギーを、\nこの角度で切り取る。"},"61.6":{"code":"61.6","label":"地球の浣腸","title":"水沢節","target":60,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["地球の浣腸","水沢節","修行僧"],"source_excerpt":"修行僧\n修行僧が滝に打たれている常態。滝に打たれる時は、強い水流\nの中、体の軸が少しでもずれると一氣に流されるし、水流が弱\nい滝では修行にならない。非常にエネルギーが真ん中に\n固まっていて、真ん中で耐えていると、ビューンと飛んでいける\n感じ。"},"62.1":{"code":"62.1","label":"歓喜","title":"雷火豊","target":55,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["歓喜","雷火豊","成功した姿の形"],"source_excerpt":"成功した姿の形\n結婚したい人なら、ウエディングドレス姿や白無垢を着ている\n姿が、\n「成功した姿」。子供が欲しい人なら、子供を抱っこして\nいる姿が、\n「成功した姿」。長い歳月をかけて願い続け、想いを\nかけて、それが成った時の姿形のこと。"},"62.2":{"code":"62.2","label":"裏信長","title":"雷風恒","target":32,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["裏信長","雷風恒","六法全書 , 基礎工事, 基本設計"],"source_excerpt":"六法全書 , 基礎工事, 基本設計\nベクトル２は、インゴッドの一番もっともらしい形。設計図や設\n計する為のソフトが入っている。一番ベースになる考え方。\n「基\n礎工事」ってこと。山の基本的な考え方。内側から上がってき\nたものを基礎とする、という意味合いだから「六法全書」。"},"62.3":{"code":"62.3","label":"スーパースター","title":"雷地豫","target":16,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["スーパースター","雷地豫","遅咲きのスーパースター , 救世主"],"source_excerpt":"遅咲きのスーパースター , 救世主\nＫＦＣの創始者カーネルサンダース氏は、60 歳を超えてから、\nあの味に辿り着いた。失敗を繰り返し作り続けた結果、\nクリス\nマスにはＫＦＣと言われるくらい皆から選ばれた「遅咲きのスー\nパースター」。砂漠に水を引いた人のような「救世主」。みんな\nが見守り、想いに道ができる。"},"62.4":{"code":"62.4","label":"体感覚","title":"地山謙","target":15,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["体感覚","地山謙","ミーハー , 初体験 , 新食感"],"source_excerpt":"ミーハー , 初体験 , 新食感\n常にフレッシュで流行りに敏感なエネルギー。\n「ミーハー」\n「初\n体験」\n「新食感」のフレッシュな氣持ちで、\n新しい道を開く為に、\nコミュニケーションをさせる。\n「流行り」の「話題の」何かをセ\nレクトする為に、古いものは積み上がらないようになっているの\nかもしれない。"},"62.5":{"code":"62.5","label":"広告担当","title":"沢山咸","target":31,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["広告担当","沢山咸","宇宙戦隊"],"source_excerpt":"宇宙戦隊\n皆さんの好きな宇宙戦隊キャラクター、セーラームーン・キュー\nティーハニー・ガンダムとか何でもハマります。戦うコスプレと\nいうか、戦うキャラというか。ジャンヌダルクのような生々しい\n人物像ではなくて、\nちょっとファンタジックな感じ。"},"62.6":{"code":"62.6","label":"いとをかし","title":"火山旅","target":56,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["いとをかし","火山旅","やっちまった人 , 実行, 具体的手段"],"source_excerpt":"やっちまった人 , 実行, 具体的手段\n没入している姿が人に見られている常態。東大で切腹した\n三島由紀夫氏みたいに、皆に理を見せて、やっちゃった人、出\n来上がっちゃった人。この番号の人で、そういう大きなことを\nやっていない人は、全然ダメな場にいる。やっちゃった人だか\nら、上手にミミクリーができてないと駄目。"},"63.1":{"code":"63.1","label":"炎上商法","title":"水山蹇","target":39,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["炎上商法","水山蹇","ルパン, 義賊"],"source_excerpt":"ルパン, 義賊\n表面では悪い顔をして、実のところ正義を貫き、世の中の「悪」\nをくじく存在。やっていることが、良いことか、悪いことかは分\nからないけれど、\n「怪盗ルパン」のように、自分が信じた正義\nの真ん中をやっている「義賊」。"},"63.2":{"code":"63.2","label":"遺伝子の型番","title":"水天需","target":5,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["遺伝子の型番","水天需","天才弁護士 , 規律 , 規則"],"source_excerpt":"天才弁護士 , 規律 , 規則\n「証人」が「遺伝子の型番」の方を向くということは、\n「自分の\n内側がルール」という立ち位置。自分自身が証人であり、そこ\nに立つという意味。外側から見える姿としては「天才弁護士」\nのようだけど、その存在が、\n「規律」\n「規則」そのもの。"},"63.3":{"code":"63.3","label":"産婆さん","title":"水雷屯","target":3,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["産婆さん","水雷屯","裁判官 , 法律"],"source_excerpt":"裁判官 , 法律\nベクトル 2 の弁護士が、ベクトル 3 になると裁判官。人を動かす\nのではなく、大きく仕切って場を動かす人。ベクトル2で\n「規則」\nだったものが、3になると「法律」という規模になる。微妙なエ\nネルギーの差だから、この二つを並べて解釈するとわかりや\nすい。"},"63.4":{"code":"63.4","label":"親分","title":"沢火革","target":49,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["親分","沢火革","血判状 , 約束手形"],"source_excerpt":"血判状 , 約束手形\n状況としてはストライキ。自分たちの思いを通すために一旦動\nきを停止して、この力を使う。荒々しい感じ。心と心の約束が\nうまくいかなかった場合は戦う。分けるエネルギーを突き付け\nる感じ。\n「親分」の方向に向いた「証人」の、すこし重ための\nエネルギー。"},"63.5":{"code":"63.5","label":"はぁはぁしよっ","title":"地火明夷","target":36,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["はぁはぁしよっ","地火明夷","水脈 , 夢のお告げ"],"source_excerpt":"水脈 , 夢のお告げ\n夢じゃなくて、眠っているときに受け取る「夢のお告げ」。\n「水」は命を繋ぐベース。この世界を完成させるための情報の\nインフラであり、すべての命をつなぐには絶対に必要な要素だ\nから「水脈」。どちらも、次の世界の重要な要素。"},"63.6":{"code":"63.6","label":"一緒だね","title":"風火家人","target":37,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["一緒だね","風火家人","家訓 , 年功序列"],"source_excerpt":"家訓 , 年功序列\n家庭内の家訓や、社会の規律のような感覚で、それを使って\n皆でやっていくこと。\n「理（ことわり）を一つの形にして、使って\nいこう」というエネルギー。平たく叩いて形が起こった瞬間、\nこれを持って何かをしていくのが、火のエネルギー。"},"64.1":{"code":"64.1","label":"涙の最終ランナー","title":"火沢睽","target":38,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["涙の最終ランナー","火沢睽","古典芸能 , パフォーマンスをする書道家"],"source_excerpt":"古典芸能 , パフォーマンスをする書道家\n「チャネラー」の受け取るものを「涙の最終ランナー」で見せつ\nけていく。舞台の上で文字を書いて世界を表現する「即興アー\nティスト」みたいなエネルギー。特に、古典的な道という意味が\n含まれているので、\n「古典芸能」や「書道家」。"},"64.2":{"code":"64.2","label":"次行ってみよう","title":"火地晋","target":35,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["次行ってみよう","火地晋","議長 , 取り扱い説明"],"source_excerpt":"議長 , 取り扱い説明\n多くの人になにかを説明する際に使えるエネルギー。ルールや\n内容を説明するというよりは、取扱説明書を指し示して、\n「これ\nを全部読み上げると分かるよ」と、教えてあげるみたいな感じ。\n会議における「議長」みたいな役割。"},"64.3":{"code":"64.3","label":"養育","title":"火風鼎","target":50,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["養育","火風鼎","生存ゲーム"],"source_excerpt":"生存ゲーム\n「チャネラー」が「養育」のエネルギーに向かうと、デジタル\nのゲームや、今までなかった宗教などをつくるエネルギーに\nなる。新しい世界を作って、生きていくためのルールを作る\n感じかな。これは実際に GOD SEAL にハメると「うわ〜」\nとなるようなミミクリー。"},"64.4":{"code":"64.4","label":"頭脳派","title":"山水蒙","target":4,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["頭脳派","山水蒙","薬のデザイン, 化学記号"],"source_excerpt":"薬のデザイン, 化学記号\nこっちの副作用を抑えて、あっちの効能を上げることで、欲\nしい効果を得る。化学反応を繰り返し、たくさんの叡智を吸\n収しながら、欲しい効果をセレクトして設計するという意味。\n「帯に短かし、たすきに長し」のものを、最適にする。キッチリ\nと要領が得られるように設計する力。"},"64.5":{"code":"64.5","label":"境界線","title":"天水訟","target":6,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["境界線","天水訟","超個性 , 習慣"],"source_excerpt":"超個性 , 習慣\n「広い世界の中で私という者は何なのだろう」という問いの\n答え。この世界のなかでの「私」というのは、あなたが毎日\n習慣にしていることや、蓄積されているデータ。あなたが毎\n日やっている習慣こそが、\nその蓄積こそが、\nこの世界のあなた。"},"64.6":{"code":"64.6","label":"お母さん","title":"雷水解","target":40,"source_available":true,"source_pdf":"【57~64】エモーショナルミミクリー〜感情的擬態運命の演出ハンドブック〜_1.0.pdf","source_terms":["お母さん","雷水解","名鵜飼"],"source_excerpt":"名鵜飼\n鵜匠さん、鵜を操る人。この番号の点に込められているエネ\nルギーは「名鵜飼」という立ち位置。自分は動かずに人を動\nかしなさい。そこに立てば、欲しいものが手に入る。\n「想い」\nがある上で、魚を動かして、欲しい利益を正しく得るということ。"}},"sample":{"source_image":"63e3adbd-6e19-4c05-ac9f-1c9714fece98.jpg","reading_method":"manual_from_source_image","maria":[{"position_id":"A","code":"17.4"},{"position_id":"B","code":"1.4"},{"position_id":"C","code":"19.6"},{"position_id":"D","code":"47.5"},{"position_id":"E","code":"46.1"},{"position_id":"F","code":"35.1"},{"position_id":"G","code":"33.1"},{"position_id":"H","code":"54.4"},{"position_id":"I","code":"58.2"},{"position_id":"J","code":"38.3"},{"position_id":"K","code":"18.4"}],"face":[{"position_id":"A","code":"37.5"},{"position_id":"B","code":"2.3"},{"position_id":"C","code":"51.6"},{"position_id":"D","code":"57.4"},{"position_id":"E","code":"62.3"},{"position_id":"F","code":"54.5"},{"position_id":"G","code":"41.2"},{"position_id":"H","code":"15.2"},{"position_id":"I","code":"51.3"},{"position_id":"J","code":"57.6"},{"position_id":"K","code":"58.5"}]}}</script>
  <script>
    const data = JSON.parse(document.getElementById('godseal-data').textContent);
    const codePattern = /^([1-9]|[1-5][0-9]|6[0-4])\.([1-6])$/;
    const state = { maria: Array(11).fill(''), face: Array(11).fill('') };
    const positions = 'ABCDEFGHIJK'.split('');

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function entryFor(code) {
      return data.entries[code] || null;
    }

    function normalizeCode(value) {
      return value.trim().replace(/[．。]/g, '.');
    }

    function renderRows(section) {
      const target = document.getElementById(section + 'List');
      target.innerHTML = '';
      data.schema[section].forEach((frame, index) => {
        const row = document.createElement('div');
        row.className = 'frame-row';
        row.innerHTML = `
          <div class="pos">${escapeHtml(frame.position_id)}</div>
          <div class="planet">${escapeHtml(frame.planet)}<span>${escapeHtml(frame.source_label || '')}</span></div>
          <div class="role">${escapeHtml(frame.role)}<span>${escapeHtml(frame.role_description)}</span></div>
          <div class="code-cell"><input inputmode="decimal" autocomplete="off" data-section="${escapeHtml(section)}" data-index="${index}" aria-label="${escapeHtml(section + ' ' + frame.position_id)}"></div>
        `;
        target.appendChild(row);
      });
    }

    function setNotice(text, good = true) {
      const notice = document.getElementById('notice');
      notice.textContent = text;
      notice.className = 'notice ' + (good ? 'ok-text' : 'bad-text');
    }

    function currentReading() {
      return {
        source_image: document.getElementById('sourceImage').value.trim() || 'unknown',
        reading_method: 'manual_from_workbench',
        maria: positions.map((position_id, index) => ({ position_id, code: state.maria[index] })),
        face: positions.map((position_id, index) => ({ position_id, code: state.face[index] }))
      };
    }

    function codeList(section) {
      return state[section].map(code => code || '?').join(',');
    }

    function shellQuote(value) {
      return "'" + value.replaceAll("'", "'\\''") + "'";
    }

    function pipelineCommand() {
      return [
        'python3 scripts/run_chart_pipeline.py',
        '--source-image ' + shellQuote(document.getElementById('sourceImage').value.trim() || 'unknown'),
        '--maria ' + shellQuote(codeList('maria')),
        '--face ' + shellQuote(codeList('face')),
        '--reading-method manual_from_workbench',
        '--output-prefix ' + shellQuote(document.getElementById('outputPrefix').value.trim() || 'reports/chart')
      ].join(' \\\n  ');
    }

    function statusFor(section, index, code) {
      const schema = data.schema[section][index];
      if (!code) {
        return { kind: 'empty', label: 'empty', schema, message: '未入力' };
      }
      if (!codePattern.test(code)) {
        return { kind: 'invalid', label: 'invalid', schema, message: '番号形式が不正' };
      }
      const entry = entryFor(code);
      if (!entry) {
        return { kind: 'invalid', label: 'invalid', schema, message: '384枠に存在しない番号' };
      }
      if (!entry.source_available) {
        return { kind: 'missing', label: 'missing-source', schema, entry, message: 'ローカルPDFに該当本文なし' };
      }
      return { kind: 'ok', label: 'source-backed', schema, entry, message: entry.label + ' / ' + entry.title };
    }

    function update() {
      let valid = 0;
      let missing = 0;
      let invalid = 0;
      const review = [];
      ['maria', 'face'].forEach(section => {
        state[section].forEach((code, index) => {
          const status = statusFor(section, index, code);
          if (status.kind === 'ok') valid += 1;
          if (status.kind === 'missing') missing += 1;
          if (status.kind === 'invalid' || status.kind === 'empty') invalid += 1;
          review.push({ section, index, code, status });
        });
      });
      document.getElementById('validCount').textContent = String(valid);
      document.getElementById('missingCount').textContent = String(missing);
      document.getElementById('invalidCount').textContent = String(invalid);
      document.getElementById('commandOutput').value = pipelineCommand();
      document.getElementById('jsonOutput').value = JSON.stringify(currentReading(), null, 2);
      renderReview(review);
    }

    function renderReview(items) {
      const list = document.getElementById('reviewList');
      list.innerHTML = '';
      items.forEach(item => {
        const node = document.createElement('div');
        const sectionLabel = item.section === 'maria' ? 'Maria' : 'Face';
        const position = positions[item.index];
        const schema = item.status.schema;
        const code = item.code || '-';
        const terms = item.status.entry && item.status.entry.source_terms.length
          ? ' / ' + item.status.entry.source_terms.join(' / ')
          : '';
        node.className = 'review-item ' + item.status.kind;
        node.innerHTML = `
          <div class="review-head">
            <span>${escapeHtml(sectionLabel)} ${escapeHtml(position)} ${escapeHtml(schema.planet)} ${escapeHtml(schema.role)}</span>
            <span>${escapeHtml(code)} · ${escapeHtml(item.status.label)}</span>
          </div>
          <div class="review-body">${escapeHtml(item.status.message + terms)}</div>
        `;
        list.appendChild(node);
      });
    }

    function loadSample() {
      ['maria', 'face'].forEach(section => {
        data.sample[section].forEach((frame, index) => {
          state[section][index] = frame.code;
          const input = document.querySelector(`input[data-section="${section}"][data-index="${index}"]`);
          input.value = frame.code;
        });
      });
      document.getElementById('sourceImage').value = data.sample.source_image || '';
      update();
      setNotice('sample loaded');
    }

    async function copyText(id, label) {
      const value = document.getElementById(id).value;
      try {
        await navigator.clipboard.writeText(value);
        setNotice(label + ' copied');
      } catch (error) {
        setNotice('copy unavailable', false);
      }
    }

    function clearAll() {
      ['maria', 'face'].forEach(section => {
        state[section] = Array(11).fill('');
      });
      document.querySelectorAll('.code-cell input').forEach(input => {
        input.value = '';
      });
      update();
      setNotice('cleared');
    }

    function bind() {
      renderRows('maria');
      renderRows('face');
      document.querySelectorAll('.code-cell input').forEach(input => {
        input.addEventListener('input', event => {
          const target = event.currentTarget;
          const section = target.dataset.section;
          const index = Number(target.dataset.index);
          const normalized = normalizeCode(target.value);
          state[section][index] = normalized;
          if (target.value !== normalized) target.value = normalized;
          update();
        });
      });
      document.getElementById('sourceImage').addEventListener('input', update);
      document.getElementById('outputPrefix').addEventListener('input', update);
      document.getElementById('loadSample').addEventListener('click', loadSample);
      document.getElementById('copyCommand').addEventListener('click', () => copyText('commandOutput', 'command'));
      document.getElementById('copyJson').addEventListener('click', () => copyText('jsonOutput', 'json'));
      document.getElementById('clearAll').addEventListener('click', clearAll);
      update();
    }

    bind();
  </script>
</body>
</html>
